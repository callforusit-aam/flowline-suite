/* ---- vista: giorno ingrandito (timeline oraria) ---- */
function openDay(iso){state.shifts.day=iso;state.view='giorno';render()}
function closeDay(){state.shifts.day=null;state.view='griglia';render()}
function viewGiorno(){
  const iso=state.shifts.day;const d=parseD(iso);const t=today();
  const members=state.shifts.members;
  // finestra oraria adattiva sui dati del giorno
  let lo=24*60, hi=0;
  members.forEach(m=>{
    const s=daySplit(m.id,iso);
    s.avail.forEach(b=>{lo=Math.min(lo,b.start);hi=Math.max(hi,b.end)});
  });
  if(lo>hi){lo=8*60;hi=20*60;}
  lo=Math.max(0,Math.floor(lo/60)*60-60); hi=Math.min(24*60,Math.ceil(hi/60)*60+60);
  const span=hi-lo;
  const PX=52;                       // altezza di un'ora
  const H=span/60*PX;
  const y=v=>(v-lo)/60*PX;
  const hours=[];for(let h=Math.ceil(lo/60);h<=Math.floor(hi/60);h++)hours.push(h);
  const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();
  const showNow=sameDay(d,t)&&nowMin>=lo&&nowMin<=hi;

  const cols=members.map(m=>{
    const {avail,free,occupied}=daySplit(m.id,iso);
    const mine=m.id===state.shifts.meId;
    const tot=free.reduce((s,b)=>s+(b.end-b.start),0);
    const busyTot=occupied.reduce((s,b)=>s+(b.end-b.start),0);
    const body = avail.length ? `
      ${free.map(b=>{const hgt=(b.end-b.start)/60*PX;
        return `<div class="gc-ev free${mine?' mine':''}" style="top:${y(b.start)}px;height:${hgt}px;--c:${m.color}"
          ${mine?`onclick="offForDay('${m.id}','${iso}',${b.start},${b.end})" title="Clicca per rimuovere questa fascia solo oggi"`:''}>
          <span class="gc-ev-t">${m2t(b.start)} – ${m2t(b.end)}</span>
          ${hgt>34?'<span class="gc-ev-s">disponibile</span>':''}
        </div>`}).join('')}
      ${occupied.map(b=>{const hgt=(b.end-b.start)/60*PX;
        return `<div class="gc-ev busy" style="top:${y(b.start)}px;height:${hgt}px" title="Non disponibile ${escAttr(m2t(b.start)+'–'+m2t(b.end))}">
          <span class="gc-ev-t">${m2t(b.start)} – ${m2t(b.end)}</span>
          ${hgt>34?'<span class="gc-ev-s">non disponibile</span>':'<span class="gc-lock">🔒</span>'}
        </div>`}).join('')}`
      : `<div class="gc-noavail" style="top:0;height:${H}px"><span>non disponibile</span></div>`;
    return `<div class="gc-col">
      <div class="gc-col-h${mine?' mine':''}">
        <span class="sh-dot" style="background:${m.color}"></span>
        <div class="gc-col-n">${esc(m.name)}${mine?' <span class="tl-you">tu</span>':''}</div>
        <div class="gc-col-s">${tot?Math.floor(tot/60)+'h'+(tot%60?String(tot%60).padStart(2,'0'):'')+' libere':'non disponibile'}${busyTot?` · <span class="gc-busy-n">${Math.floor(busyTot/60)?Math.floor(busyTot/60)+'h':''}${busyTot%60?String(busyTot%60)+'m':''} occupate</span>`:''}</div>
      </div>
      <div class="gc-track" style="height:${H}px">
        ${hours.map(h=>`<div class="gc-line" style="top:${y(h*60)}px"></div>`).join('')}
        ${body}
        ${showNow?`<div class="gc-now" style="top:${y(nowMin)}px"></div>`:''}
      </div>
    </div>`;
  }).join('');

  const dispon=members.filter(m=>daySplit(m.id,iso).free.length).length;
  return `
  <div class="cal-bar">
    <button class="btn sm ghost" onclick="openDay('${isoD(addDays(d,-1))}')"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="cal-title"><b style="font-size:17px;text-transform:capitalize">${fmtDLong(d)}</b><span class="email-cell">${sameDay(d,t)?'oggi · ':''}${dispon} disponibili su ${members.length}</span></div>
    <button class="btn sm ghost" onclick="openDay('${isoD(addDays(d,1))}')"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
    ${!sameDay(d,t)?`<button class="btn sm" onclick="openDay('${isoD(t)}')">Oggi</button>`:''}
    <button class="btn sm" onclick="closeDay()">← Settimana</button>
  </div>
  <div class="card gc-card">
    <div class="gc-grid" style="--gutter:52px">
      <div class="gc-gutter">
        <div class="gc-gutter-h"></div>
        <div class="gc-gutter-b" style="height:${H}px">
          ${hours.map(h=>`<div class="gc-hl" style="top:${y(h*60)}px">${String(h).padStart(2,'0')}:00</div>`).join('')}
          ${showNow?`<div class="gc-now-lbl" style="top:${y(nowMin)}px">${m2t(nowMin)}</div>`:''}
        </div>
      </div>
      <div class="gc-cols">${cols||'<div class="cal-empty" style="padding:20px">Nessun collaboratore</div>'}</div>
    </div>
  </div>
  <div class="cal-legend">
    <span class="cal-leg"><span class="lg-free"></span>Disponibile</span>
    <span class="cal-leg"><span class="lg-busy"></span>Occupato da un impegno in calendario</span>
    <span class="cal-leg"><span class="lg-none"></span>Fuori disponibilità</span>
    <span class="cal-leg" style="margin-left:auto;color:var(--faint)">Clicca una tua fascia verde per rimuoverla solo oggi</span>
  </div>`;
}

/* ---------- DASHBOARD ---------- */
function viewDashboard(){
  if(!state.contacts.length) return emptyState();
  const t=today();
  const tot=state.contacts.length;
  const due=state.contacts.filter(dueToday).length;
  const late=state.contacts.filter(isLate).length;
  const waiting=state.contacts.filter(c=>!c.haRisposto && (c.step||0)>0 && (c.step||0)<state.cadence.length && !isDue(c)).length;
  const replied=state.contacts.filter(c=>c.haRisposto).length;
  const concluded=state.contacts.filter(c=>!c.haRisposto && (c.step||0)>=state.cadence.length).length;

  // weekly outlook
  const week=[];for(let i=0;i<7;i++)week.push(addDays(t,i));
  const wcount=week.map(d=>state.contacts.filter(c=>{const na=nextAction(c);return na&&sameDay(na.dueDate,d)}).length);
  const maxW=Math.max(1,...wcount);

  return `
  <div class="grid stats">
    <div class="card stat today"><div class="accent-bar"></div>
      <div class="k">In coda oggi</div><div class="v">${due}</div>
      <div class="meta">${late?`<span style="color:var(--late)">${late} in ritardo</span>`:'tutto in pari'}</div></div>
    <div class="card stat"><div class="accent-bar"></div>
      <div class="k">Contatti totali</div><div class="v">${tot}</div>
      <div class="meta">${concluded} sequenze concluse</div></div>
    <div class="card stat wait"><div class="accent-bar"></div>
      <div class="k">In attesa di risposta</div><div class="v">${waiting}</div>
      <div class="meta">follow-up programmati</div></div>
    <div class="card stat reply"><div class="accent-bar"></div>
      <div class="k">Risposte ricevute</div><div class="v">${replied}</div>
      <div class="meta">${tot?Math.round(replied/tot*100):0}% tasso risposta</div></div>
  </div>

  <div class="section-h"><h3>Prossimi 7 giorni</h3><div class="line"></div></div>
  <div class="card" style="padding:18px">
    <div style="display:flex;gap:10px;align-items:flex-end;height:120px">
      ${week.map((d,i)=>{
        const h=wcount[i]/maxW*100;const isToday=sameDay(d,t);
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end">
          <div style="font-size:12px;font-weight:700;color:${wcount[i]?'var(--text)':'var(--faint)'}">${wcount[i]||''}</div>
          <div style="width:100%;max-width:42px;height:${Math.max(4,h)}%;border-radius:6px 6px 0 0;background:${isToday?'var(--accent)':wcount[i]?'var(--accent-soft)':'var(--border)'};${isToday?'':'border:1px solid var(--border)'}" title="${wcount[i]} invii"></div>
          <div style="font-size:11px;color:${isToday?'var(--accent)':'var(--muted)'};font-weight:${isToday?700:500};text-transform:capitalize">${d.toLocaleDateString('it-IT',{weekday:'short'})}<br><span style="font-size:10px;color:var(--faint)">${d.getDate()}</span></div>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${due?`<div class="section-h"><h3>Da inviare oggi</h3><span class="count">${due} email</span><div class="line"></div>
    <button class="btn sm primary" onclick="go('coda')">Vai alla coda →</button></div>
  <div class="card"><div class="table-wrap" style="border:none">
    <table><tbody>
    ${state.contacts.filter(dueToday).slice(0,6).map(c=>{const na=nextAction(c);const st=statusOf(c);
      return `<tr onclick="go('coda')" style="cursor:pointer">
        <td class="az">${esc(c.azienda)}</td>
        <td class="email-cell">${esc(c.email)}</td>
        <td><span class="step-pill">${na?esc(na.label):''}</span></td>
        <td>${chip(st)}</td></tr>`}).join('')}
    </tbody></table></div></div>`:''}
  `;
}

/* ---------- PIANIFICAZIONE ---------- */
let _planSel=new Set();
function viewPianifica(){
  if(!state.contacts.length) return emptyState();
  const t=today();
  const cap=state.config.maxAlGiorno||10;
  const backlog=state.contacts.filter(isUnplanned);
  const planned=state.contacts.filter(c=>!c.haRisposto && (c.step||0)===0 && c.scheduledDate)
    .sort((a,b)=>parseD(a.scheduledDate)-parseD(b.scheduledDate));
  // carico per i prossimi giorni lavorativi (tutti gli step, non solo email 1)
  const loadByDay={};
  state.contacts.forEach(c=>{const na=nextAction(c);if(na&&na.dueDate>=t){const k=isoD(na.dueDate);loadByDay[k]=(loadByDay[k]||0)+1;}});
  const strip=[];let d=new Date(t),guard=0;
  while(strip.length<10 && guard<40){ if(!(state.config.saltaWeekend&&(d.getDay()===0||d.getDay()===6))) strip.push(new Date(d)); d=addDays(d,1);guard++; }
  const defStart=isoD(nextWorkday(addDays(t,1)));

  // strip carico
  const stripHtml=strip.map(dd=>{const k=isoD(dd);const n=loadByDay[k]||0;const over=n>cap;const isToday=sameDay(dd,t);
    return `<div class="load-cell${isToday?' today':''}" title="${n} invii previsti">
      <div class="load-d">${dd.toLocaleDateString('it-IT',{weekday:'short'})}<br><b>${dd.getDate()}/${dd.getMonth()+1}</b></div>
      <div class="load-bar-wrap"><div class="load-bar${over?' over':''}" style="height:${Math.min(100,n/Math.max(cap,1)*100)}%"></div></div>
      <div class="load-n${over?' over':''}">${n}</div>
    </div>`;}).join('');

  if(!backlog.length && !planned.length){
    return `<div class="empty"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 4h18v18H3z M16 2v4 M8 2v4 M3 10h18"/></svg>
      <h4>Tutto pianificato</h4><p>Non ci sono contatti da pianificare. Importa nuovi lead per assegnare le date di contatto.</p>
      <button class="btn primary" onclick="pickFile()">Importa contatti</button></div>`;
  }

  let html=`
  <div class="section-h" style="margin-top:0"><h3>Carico per giorno</h3><span class="count">limite ${cap}/giorno</span><div class="line"></div></div>
  <div class="card" style="padding:14px"><div class="load-strip">${stripHtml}</div></div>`;

  if(backlog.length){
    html+=`
    <div class="card plan-bar">
      <div class="plan-bar-row">
        <div class="plan-sel-info"><b id="plan-count">0</b> selezionati su ${backlog.length}
          <button class="btn sm ghost" onclick="planSelAll(true)">Tutti</button>
          <button class="btn sm ghost" onclick="planSelAll(false)">Nessuno</button>
        </div>
      </div>
      <div class="plan-bar-row">
        <div class="plan-group">
          <span class="plan-lbl">Assegna a una data</span>
          <input type="date" id="plan-date" value="${defStart}">
          <button class="btn sm primary" onclick="planSelected(document.getElementById('plan-date').value)">Pianifica selezionati</button>
          <button class="btn sm ghost" onclick="planSelected('${isoD(t)}')">Oggi</button>
          <button class="btn sm ghost" onclick="planSelected('${defStart}')">Domani</button>
        </div>
      </div>
      <div class="plan-bar-row">
        <div class="plan-group">
          <span class="plan-lbl">Distribuzione automatica</span>
          <input type="number" id="plan-perday" value="${cap}" style="width:64px"> al giorno, da
          <input type="date" id="plan-autostart" value="${defStart}">
          <button class="btn sm primary" onclick="planAuto(false)">Distribuisci selezionati</button>
          <button class="btn sm" onclick="planAuto(true)">Distribuisci tutto il backlog</button>
        </div>
      </div>
    </div>

    <div class="section-h"><h3>Da pianificare</h3><span class="count">${backlog.length}</span><div class="line"></div></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:34px"><input type="checkbox" id="plan-allcheck" onclick="planSelAll(this.checked)"></th>
          <th>Azienda</th><th>Email</th><th>Sede</th></tr></thead>
        <tbody>
        ${backlog.map(c=>`<tr onclick="if(event.target.tagName!=='INPUT'){const cb=this.querySelector('input');cb.checked=!cb.checked;togglePlanSel('${c.id}',cb.checked)}">
          <td><input type="checkbox" data-pid="${c.id}" ${_planSel.has(c.id)?'checked':''} onclick="togglePlanSel('${c.id}',this.checked)"></td>
          <td class="az">${esc(c.azienda)}</td>
          <td class="email-cell">${esc(c.email)}</td>
          <td class="email-cell">${esc(c.sede||'—')}</td>
        </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  if(planned.length){
    html+=`<div class="section-h"><h3>Già pianificati (prima email)</h3><span class="count">${planned.length}</span><div class="line"></div></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Azienda</th><th>Email</th><th>Data prevista</th><th></th></tr></thead>
      <tbody>
      ${planned.map(c=>{const dd=parseD(c.scheduledDate);const lateP=dd<t;
        return `<tr>
          <td class="az">${esc(c.azienda)}</td>
          <td class="email-cell">${esc(c.email)}</td>
          <td><span class="chip ${lateP?'late':'wait'}"><span class="d"></span>${fmtDLong(dd)}</span></td>
          <td style="text-align:right">
            <input type="date" value="${c.scheduledDate}" onchange="rescheduleOne('${c.id}',this.value)" style="margin-right:6px">
            <button class="btn sm ghost danger" onclick="unplan('${c.id}')">Rimetti in backlog</button>
          </td>
        </tr>`;}).join('')}
      </tbody></table></div>`;
  }
  return html;
}
function bindPianifica(){ updatePlanCount(); }
function updatePlanCount(){const el=document.getElementById('plan-count');if(el)el.textContent=_planSel.size;}
function togglePlanSel(id,on){ if(on)_planSel.add(id);else _planSel.delete(id); updatePlanCount(); }
function planSelAll(on){
  const backlog=state.contacts.filter(isUnplanned);
  _planSel=new Set(on?backlog.map(c=>c.id):[]);
  render();
}
function planSelected(dateISO){
  if(!dateISO){toast('Scegli una data','warn');return}
  if(!_planSel.size){toast('Seleziona prima dei contatti','warn');return}
  let n=0;
  state.contacts.forEach(c=>{ if(_planSel.has(c.id) && isUnplanned(c)){ c.scheduledDate=dateISO; n++; } });
  _planSel.clear();persist();render();
  toast(`${n} contatti pianificati per ${fmtDLong(parseD(dateISO))}`,'ok');
}
function planAuto(all){
  const perDay=Math.max(1, +(document.getElementById('plan-perday')?.value)||state.config.maxAlGiorno||10);
  const startISO=document.getElementById('plan-autostart')?.value || isoD(nextWorkday(addDays(today(),1)));
  let pool=state.contacts.filter(isUnplanned);
  if(!all) pool=pool.filter(c=>_planSel.has(c.id));
  if(!pool.length){toast(all?'Backlog vuoto':'Nessun contatto selezionato','warn');return}
  let day=nextWorkday(parseD(startISO)); let cnt=0, days=0;
  pool.forEach(c=>{
    c.scheduledDate=isoD(day); cnt++;
    if(cnt>=perDay){ cnt=0; days++; day=nextWorkday(addDays(day,1)); }
  });
  _planSel.clear();persist();render();
  toast(`${pool.length} contatti distribuiti (${perDay}/giorno)`,'ok');
}
function rescheduleOne(id,dateISO){const c=state.contacts.find(x=>x.id===id);if(c&&dateISO){c.scheduledDate=dateISO;persist();render();toast('Data aggiornata','ok')}}
function unplan(id){const c=state.contacts.find(x=>x.id===id);if(c){c.scheduledDate=null;persist();render();toast('Rimesso in backlog','warn')}}

/* ---------- CODA INVIO ---------- */
let _showLate=false;
function toggleLate(){_showLate=!_showLate;render()}
function viewCoda(){
  if(!state.contacts.length) return emptyState();
  const cap=state.config.maxAlGiorno||999;
  const todayList=state.contacts.filter(dueToday).sort((a,b)=>(a.step||0)-(b.step||0));
  const lateList=state.contacts.filter(isLate).sort((a,b)=>nextAction(a).dueDate-nextAction(b).dueDate);

  if(!todayList.length && !lateList.length){
    const backlog=state.contacts.filter(isUnplanned).length;
    return `<div class="empty"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
    <h4>Niente da inviare oggi</h4>
    <p>${backlog?`Hai <b>${backlog} contatti da pianificare</b>: assegna loro una data nella sezione Pianificazione e compariranno qui nel giorno scelto.`:'Nessun contatto previsto per oggi. I prossimi follow-up compariranno qui alla data prevista.'}</p>
    <button class="btn primary" onclick="go('${backlog?'pianifica':'calendario'}')">${backlog?'Vai alla pianificazione →':'Vedi il calendario'}</button></div>`;
  }

  let html='';
  // banner ritardi (fuori dal "solo oggi", ma recuperabili a richiesta)
  if(lateList.length){
    html+=`<div class="card" style="padding:12px 16px;margin-bottom:14px;border-left:3px solid var(--late);display:flex;align-items:center;gap:12px">
      <svg style="width:18px;height:18px;color:var(--late)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4 M12 16h.01"/></svg>
      <div style="flex:1"><b>${lateList.length} follow-up in ritardo</b><div class="email-cell">erano previsti nei giorni scorsi e non sono ancora partiti.</div></div>
      <button class="btn sm" onclick="toggleLate()">${_showLate?'Nascondi':'Mostra e recupera'}</button>
    </div>`;
    if(_showLate){
      html+=`<div class="section-h"><h3 style="color:var(--late)">In ritardo</h3><span class="count">${lateList.length}</span><div class="line"></div></div>`;
      html+=lateList.map((c,i)=>codaCard(c,i,9999)).join('');
    }
  }

  // intestazione di oggi
  const dlabel=today().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  html+=`<div class="section-h"><h3>Oggi · ${dlabel}</h3><span class="count">${todayList.length} contatti</span><div class="line"></div>
    ${todayList.length?`<button class="btn sm" onclick="generateAllDrafts()"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3v4 M3 5h4 M19 17v4 M17 19h4 M12 3l1.9 5.8L20 11l-6.1 2.2L12 19l-1.9-5.8L4 11l6.1-2.2z"/></svg>Genera mancanti</button>
    <button class="btn sm primary" id="btnSendAll" onclick="sendAllToday()"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13 M22 2l-7 20-4-9-9-4 20-7z"/></svg>Invia tutte${state.config.testMode?' (test)':''}</button>`:''}</div>`;
  if(!todayList.length){
    html+=`<div class="email-cell" style="padding:6px 2px 14px">Nessun contatto previsto per oggi.${lateList.length&&!_showLate?' Hai però dei follow-up in ritardo qui sopra.':''}</div>`;
  } else {
    if(cap<todayList.length) html+=`<div class="helptip" style="margin-bottom:12px">Hai impostato un limite di <b>${cap} email/giorno</b>: oltre questa soglia i contatti sono marcati "oltre limite", così resti nel ritmo.</div>`;
    html+=todayList.map((c,idx)=>codaCard(c,idx,cap)).join('');
  }
  return html;
}
function codaCard(c,idx,cap){
  const na=nextAction(c);const step=na.stepIndex;const d=getDraft(c,step);const st=statusOf(c);
  const over=idx>=cap;
  const subjLen=(d.oggetto||'').length, bodyLen=(d.corpo||'').length;
  return `<div class="card queue-card" id="card-${c.id}">
    <div class="qc-head">
      <div>
        <div class="az">${esc(c.azienda)}</div>
        <div class="meta">${esc(c.email)}${c.sede?' · '+esc(c.sede):''}</div>
      </div>
      <span class="step-pill">${esc(na.label)}</span>
      ${chip(st)}
      ${over?`<span class="chip da" title="Oltre il limite giornaliero">oltre limite</span>`:''}
      <div class="spacer"></div>
      <div class="meta">previsto ${fmtD(na.dueDate)}</div>
    </div>
    <div class="qc-body">
      <div>
        <div class="field-lbl">Oggetto <span class="cnt">${subjLen} car.</span></div>
        <input class="subj" data-id="${c.id}" data-f="oggetto" value="${escAttr(d.oggetto)}" placeholder="Oggetto email">
      </div>
      <div>
        <div class="field-lbl">Corpo ${step>0?'<span style="color:var(--accent-2);text-transform:none;letter-spacing:0;font-weight:600">· stesso thread</span>':''} <span class="cnt">${bodyLen} car.</span></div>
        <textarea class="body" data-id="${c.id}" data-f="corpo" placeholder="Testo dell'email...">${esc(d.corpo)}</textarea>
      </div>
      <div class="preview-note">
        <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v3"/></svg>
        In calce vengono aggiunte automaticamente ${state.config.formatoHtml?'la <b>firma</b> e':''} la riga di disiscrizione${state.config.formatoHtml?' · invio in <b>HTML</b>':' · invio in testo'}.
      </div>
    </div>
    <div class="qc-foot">
      <button class="btn sm" onclick="regen('${c.id}',${step})" id="regen-${c.id}">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Rigenera con AI</button>

function bindCodaInputs(){

async function regen(id,step){
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  const btn=document.getElementById('regen-'+id);const old=btn.innerHTML;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Genero...';
  try{
    const r=await generateEmail(c,step);
    setDraft(c,step,r);
    toast('Email rigenerata · ≈ €'+fmtMoney(r.cost||0),'ok');render();
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.innerHTML=old}
}
async function generateAllDrafts(){
  const list=state.contacts.filter(c=>dueToday(c)||(_showLate&&isLate(c)));
  if(!state.config.anthropicKey){toast('Manca la chiave Anthropic','warn');openSettings();return}
  let done=0,batchCost=0;toast('Genero '+list.length+' bozze...','warn');
  for(const c of list){
    const na=nextAction(c);if(!na)continue;
    if(c.drafts&&c.drafts[na.stepIndex]&&!c.drafts[na.stepIndex].seeded)continue;
    // for email1 with a base draft, skip (already good); generate only missing/followups
    if(na.stepIndex===0 && c.oggettoBase) continue;
    try{const r=await generateEmail(c,na.stepIndex);setDraft(c,na.stepIndex,r);batchCost+=(r.cost||0);done++;render();}catch(e){console.warn(e)}
  }
  toast(done+' bozze generate · ≈ €'+fmtMoney(batchCost),'ok');render();
}
function draftReady(c,step){const d=getDraft(c,step);return !!(d.oggetto&&d.corpo&&!(d.seeded&&step>0));}
async function sendContact(c,step){
  if(!c.email) return {err:'senza email'};
  const d=getDraft(c,step);
  if(!d.oggetto||!d.corpo||(d.seeded&&step>0)) return {skip:true};
  const res=await sendEmailGmail(c,step,d.oggetto,d.corpo);
  c.history.push({step,oggetto:d.oggetto,corpo:d.corpo,date:isoD(today())});
  if(step===0){c.anchorDate=isoD(today());c.threadId=res.threadId;c.messageId=res.messageId||c.messageId;}
  else{if(res.threadId)c.threadId=res.threadId;}
  c.dataUltimoInvio=isoD(today());
  c.step=step+1;
  if(c.drafts)delete c.drafts[step];
  persist();
  return {ok:true, simulated:res.simulated};
}
async function doSend(id,step){
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  if(!c.email){toast('Contatto senza email','err');return}
  if(!state.config.testMode && !googleReady()){toast('Connetti Google per inviare (o attiva la modalità test)','warn');connectGoogle();return}
  if(!draftReady(c,step)){toast('Completa oggetto e corpo prima di inviare','warn');return}
  const btn=document.getElementById('send-'+id);const old=btn.innerHTML;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Invio...';
  try{
    const res=await sendContact(c,step);
    toast(res.simulated?`Simulato invio a ${c.azienda}`:`Inviata a ${c.azienda}`,'ok');
    render();
  }catch(e){toast('Invio fallito: '+e.message,'err');btn.disabled=false;btn.innerHTML=old}
}
async function sendAllToday(){
  const list=state.contacts.filter(c=>dueToday(c)||(_showLate&&isLate(c)));
  const ready=list.filter(c=>{const na=nextAction(c);return na&&draftReady(c,na.stepIndex);});
  const notReady=list.length-ready.length;
  if(!ready.length){toast(notReady?'Nessuna bozza pronta: genera prima i testi mancanti':'Coda vuota','warn');return}
  if(!state.config.testMode && !googleReady()){toast('Connetti Google per inviare (o attiva la modalità test)','warn');connectGoogle();return}
  if(!confirm(`Inviare ${ready.length} email${state.config.testMode?' (SIMULATE — modalità test attiva)':''}?${notReady?`\n\n${notReady} verranno saltate perché senza testo.`:''}`))return;
  const btn=document.getElementById('btnSendAll');const old=btn?btn.innerHTML:'';
  if(btn)btn.disabled=true;
  let sent=0,fail=0,skip=notReady;
  for(const c of ready){
    const na=nextAction(c);if(!na){skip++;continue;}
    if(btn)btn.innerHTML=`<span class="spinner"></span> ${sent+1}/${ready.length}`;
    try{ const r=await sendContact(c,na.stepIndex); if(r&&r.ok)sent++; else if(r&&r.skip)skip++; else fail++; }
    catch(e){fail++;console.warn('invio',c.azienda,e.message);}
  }
  render();
  toast(`${sent} email inviate${fail?` · ${fail} errori`:''}${skip?` · ${skip} saltate`:''}`, fail?'warn':'ok');
}
function skipStep(id){
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  const na=nextAction(c);if(!na)return;
  c.history.push({step:na.stepIndex,oggetto:'(saltato)',corpo:'',date:isoD(today()),skipped:true});
  if(na.stepIndex===0)c.anchorDate=isoD(today());
  c.step=na.stepIndex+1;persist();render();toast('Step saltato','warn');
}

let _calWeek=0; // offset settimane rispetto a questa
function calNav(d){_calWeek+=d;render()}

function startOfWeek(d){const x=new Date(d);const g=(x.getDay()+6)%7;return addDays(x,-g);} // lunedì
function viewCalendario(){
  if(!state.contacts.length) return emptyState();
  const t=today();
  // mappa data->items
  const byDay={};
  let lateCount=0;
  state.contacts.forEach(c=>{const na=nextAction(c);if(!na)return;
    if(na.dueDate<t)lateCount++;
    const k=isoD(na.dueDate);(byDay[k]=byDay[k]||[]).push({c,na});
  });

  const wkStart=startOfWeek(addDays(t,_calWeek*7));
  const days=[];for(let i=0;i<7;i++)days.push(addDays(wkStart,i));
  const wkLabel=`${wkStart.getDate()} ${wkStart.toLocaleDateString('it-IT',{month:'short'})} – ${addDays(wkStart,6).getDate()} ${addDays(wkStart,6).toLocaleDateString('it-IT',{month:'short'})}`;
  const weekTotal=days.reduce((s,d)=>s+((byDay[isoD(d)]||[]).length),0);

  const stepColors=['var(--accent)','var(--accent-2)','var(--warn)','var(--late)','var(--wait)'];

  function dayCell(d){
    const k=isoD(d);const items=(byDay[k]||[]);
    const isToday=sameDay(d,t);const isPast=d<t;const wknd=(d.getDay()===0||d.getDay()===6);
    const overdue=isPast&&items.length;
    return `<div class="cal-cell${isToday?' today':''}${wknd?' wknd':''}${isPast&&!isToday?' past':''}">
      <div class="cal-cell-h">
        <span class="cal-dname">${d.toLocaleDateString('it-IT',{weekday:'short'})}</span>
        <span class="cal-dnum">${d.getDate()}</span>
        ${items.length?`<span class="cal-count${overdue?' late':''}">${items.length}</span>`:''}
      </div>
      <div class="cal-items">
        ${items.slice(0,6).map(x=>{
          const col=stepColors[Math.min(x.na.stepIndex,stepColors.length-1)];
          return `<div class="cal-item" title="${escAttr(x.c.azienda+' — '+x.na.label+' ('+x.c.email+')')}" onclick="openContact('${x.c.id}')">
            <span class="cal-dot" style="background:${col}"></span>
            <span class="cal-az">${esc(x.c.azienda||x.c.email)}</span>
          </div>`;
        }).join('')}
        ${items.length>6?`<div class="cal-more">+${items.length-6} altri</div>`:''}
        ${!items.length?`<div class="cal-empty">—</div>`:''}
      </div>
    </div>`;
  }

  const legend=state.cadence.map((s,i)=>`<span class="cal-leg"><span class="cal-dot" style="background:${stepColors[Math.min(i,stepColors.length-1)]}"></span>${esc(s.nome)}</span>`).join('');

  return `
  ${lateCount?`<div class="card" style="padding:11px 16px;margin-bottom:14px;border-left:3px solid var(--late);display:flex;align-items:center;gap:12px">
    <svg style="width:17px;height:17px;color:var(--late)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4 M12 16h.01"/></svg>
    <div style="flex:1"><b>${lateCount} in ritardo</b> <span class="email-cell">— follow-up arretrati da recuperare</span></div>
    <button class="btn sm primary" onclick="go('coda')">Vai alla coda →</button></div>`:''}

  <div class="cal-bar">
    <button class="btn sm ghost" onclick="calNav(-1)"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="cal-title"><b>${wkLabel}</b><span class="email-cell">${weekTotal} invii in settimana${_calWeek===0?' · settimana corrente':''}</span></div>
    <button class="btn sm ghost" onclick="calNav(1)"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
    ${_calWeek!==0?`<button class="btn sm" onclick="calToday()">Oggi</button>`:''}
  </div>

  <div class="cal-grid">${days.map(dayCell).join('')}</div>

  <div class="cal-legend">${legend}<span class="cal-leg" style="margin-left:auto;color:var(--faint)">Tocca un contatto per i dettagli</span></div>
  `;
}

function confirmImport(){
  const {headers,rows}=_importData;
  const fields=['email','azienda','sede','nome','ruolo','settore','descrizione','sitoWeb','tipoAsset','oggetto','corpo','disiscrizione','n'];
  const sel={};fields.forEach(f=>{const el=document.getElementById('map-'+f);sel[f]=el?(el.value===''?-1:+el.value):-1});
  const dedup=document.getElementById('dedup-tog').classList.contains('on');
  const seen=new Set(state.contacts.map(c=>c.email.toLowerCase()));
  let added=0,skipped=0;
  rows.forEach(r=>{
    const g=f=>sel[f]>=0?String(r[sel[f]]??'').trim():'';
    const email=g('email');
    if(dedup&&(!email||seen.has(email.toLowerCase()))){skipped++;return}
    if(email)seen.add(email.toLowerCase());
    state.contacts.push(mkContact({
      n:g('n'),azienda:g('azienda'),sede:g('sede'),email,ruolo:g('ruolo'),
      settore:g('settore'),descrizione:g('descrizione'),sitoWeb:g('sitoWeb'),tipoAsset:g('tipoAsset'),
      oggettoBase:g('oggetto'),corpoBase:g('corpo'),
      disiscrizione:g('disiscrizione')||state.templates.disiscrizione,
    }));
    added++;
  });
  persist();closeModal();
  if(added){state.view='pianifica';}
  render();
  toast(`${added} contatti importati — ora pianificali`,'ok');
}

async function deleteContact(id){
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  if(!confirm(`Eliminare "${c.azienda||c.email}"?\n\nVerrà rimosso anche dal database Supabase, per tutto il team.`))return;
  const backup={...c};
  state.contacts=state.contacts.filter(x=>x.id!==id);
  save(LS.contacts,state.contacts);
  closeModal();render();
  const res=await supaDelete(id);
  if(!res.ok){
    // il DB ha rifiutato: rimetto il contatto e avviso, così non c'è divergenza silenziosa
    state.contacts.push(backup);save(LS.contacts,state.contacts);render();
    toast('Eliminazione fallita sul database: '+res.err,'err');
  } else {
    toast('Contatto eliminato','ok');
  }
}

  const cf=state.config;
  modal(`<div class="modal wide" onclick="event.stopPropagation()">
    <div class="modal-h"><h3>Impostazioni</h3><div class="x" onclick="closeModal()">✕</div></div>
    <div class="modal-b">
      <label class="toggle ${cf.testMode?'on':''}" id="set-test"><span class="sw"></span>
        <span><b>Modalità test</b><br><span class="hint">Gli invii sono simulati: niente email reali. Disattiva per inviare davvero.</span></span></label>

      <div class="section-h" style="margin:4px 0 0"><h3 style="font-size:14px">Connessione Google</h3><div class="line"></div></div>
      <div class="form-row"><label>Google OAuth Client ID</label>
        <input id="set-gid" value="${escAttr(cf.googleClientId)}" placeholder="xxxxxx.apps.googleusercontent.com">
        <span class="hint">Da Google Cloud Console → Credenziali → ID client OAuth (tipo: Web). Aggiungi l'origine del tuo sito GitHub Pages tra le origini JavaScript autorizzate.</span></div>
      <div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap">
        <button class="btn sm" onclick="saveGid()">${googleReady()?'Riconnetti':'Connetti Google'}</button>
        ${googleReady()?`<button class="btn sm ghost" onclick="reauthGoogle()" title="Richiede di nuovo il consenso: serve dopo aver aggiunto nuovi permessi (es. calendario)">Riautorizza permessi</button>
        <button class="btn sm ghost danger" onclick="logoutGoogle()">Esci</button>`:''}
        ${googleReady()?`<span class="chip reply"><span class="d"></span>${esc(state.google.email||'connesso')}</span>`:''}
      </div>
      <div class="helptip">Google serve solo per <b>inviare le email</b> e rilevare le risposte via Gmail. La sorgente dei contatti è Supabase (sotto).</div>

      <div class="section-h" style="margin:4px 0 0"><h3 style="font-size:14px">Database contatti — Supabase</h3><div class="line"></div></div>
      <div class="helptip">Supabase è l'<b>unica sorgente</b>: contatti, stato e ricerche stanno online e condivisi in tempo reale con tutto il team. Per aggiungere lead, il team inserisce righe nella tabella <code>contacts</code> (Table Editor di Supabase) con almeno email e azienda: compaiono qui da soli come "da pianificare". In alternativa usa il pulsante <b>Importa</b> (CSV/XLSX).</div>
      <div class="two-col">
        <div class="form-row"><label>Project URL</label><input id="set-supaurl" value="${escAttr(cf.supabaseUrl)}" placeholder="https://xxxx.supabase.co"></div>
        <div class="form-row"><label>anon public key</label><input id="set-supakey" type="password" value="${escAttr(cf.supabaseKey)}" placeholder="eyJhbGci..."></div>
      </div>
      <div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap">
        ${supaReady()?`<span class="chip reply"><span class="d"></span>Database connesso</span>`:`<span class="chip da"><span class="d"></span>Non connesso</span>`}
        <button class="btn sm" onclick="supaLoad()">Ricarica dal database</button>
        <button class="btn sm ghost" onclick="showSupaSQL()">Mostra SQL di setup</button>
        <button class="btn sm ghost" onclick="exportTeamConfig()" title="Genera il blocco da incollare nel file per il team">Configurazione team</button>
        ${cf.supabaseUrl?`<button class="btn sm ghost" onclick="window.open('${escAttr(cf.supabaseUrl)}','_blank')">Apri Supabase</button>`:''}
      </div>
      <div class="form-row" style="margin-top:4px"><label>Migrazione una-tantum dal vecchio Google Sheet <span class="hint">(legge il foglio col tuo login Google e copia i contatti su Supabase; il foglio non resta collegato)</span></label>
        <div style="display:flex;gap:8px">
          <input id="mig-sheet" placeholder="https://docs.google.com/spreadsheets/d/...">
          <button class="btn sm" id="mig-btn" onclick="migrateFromSheet()">Migra su Supabase</button>
        </div></div>

      <div class="section-h" style="margin:4px 0 0"><h3 style="font-size:14px">Generazione AI</h3><div class="line"></div></div>
      <div class="form-row"><label>Chiave API Anthropic</label>
        <input id="set-akey" type="password" value="${escAttr(cf.anthropicKey)}" placeholder="sk-ant-...">
        <span class="hint">Usata per generare oggetto e corpo (modello ${MODEL}). Salvata solo nel browser.</span></div>

      <div class="section-h" style="margin:4px 0 0"><h3 style="font-size:14px">Regole di invio</h3><div class="line"></div></div>
      <div class="two-col">
        <div class="form-row"><label>Max email al giorno</label><input id="set-max" type="number" value="${cf.maxAlGiorno}"></div>
        <div class="form-row"><label>Finestra oraria</label>
          <div style="display:flex;gap:8px;align-items:center"><input id="set-oi" type="number" value="${cf.oraInizio}" style="width:70px">–<input id="set-of" type="number" value="${cf.oraFine}" style="width:70px"></div></div>
      </div>
      <label class="toggle ${cf.saltaWeekend?'on':''}" id="set-week"><span class="sw"></span><span>Salta sabato e domenica</span></label>
      <label class="toggle ${cf.autoStopReply?'on':''}" id="set-stop"><span class="sw"></span><span>Ferma i follow-up quando il contatto risponde</span></label>
    </div>
    <div class="modal-f" style="justify-content:space-between">
      <div style="display:flex;gap:9px">
        <button class="btn sm ghost" onclick="openCadence()">Cadenza & template →</button>
        <button class="btn sm ghost danger" onclick="resetAll()">Resetta tutto</button>
      </div>
      <div style="display:flex;gap:9px">
        <button class="btn" onclick="closeModal()">Annulla</button>
        <button class="btn primary" onclick="saveSettings()">Salva</button>
      </div>
    </div>
  </div>`);
  document.querySelectorAll('#set-test,#set-week,#set-stop').forEach(el=>el.onclick=()=>el.classList.toggle('on'));
}
function saveGid(){
  const v=document.getElementById('set-gid').value.trim();
  state.config.googleClientId=v;persist();tokenClient=null;initGoogle();
  setTimeout(()=>connectGoogle(),300);
}
function saveSettings(){
  const cf=state.config;
  const prevSupaUrl=cf.supabaseUrl, prevSupaKey=cf.supabaseKey;
  cf.googleClientId=document.getElementById('set-gid').value.trim();
  cf.anthropicKey=document.getElementById('set-akey').value.trim();
  cf.supabaseUrl=document.getElementById('set-supaurl').value.trim().replace(/\/$/,'');
  cf.supabaseKey=document.getElementById('set-supakey').value.trim();
  cf.maxAlGiorno=+document.getElementById('set-max').value||10;
  cf.oraInizio=+document.getElementById('set-oi').value||9;
  cf.oraFine=+document.getElementById('set-of').value||18;
  cf.saltaWeekend=document.getElementById('set-week').classList.contains('on');
  cf.autoStopReply=document.getElementById('set-stop').classList.contains('on');
  cf.testMode=document.getElementById('set-test').classList.contains('on');
  persist();closeModal();initGoogle();
  if(cf.supabaseUrl!==prevSupaUrl||cf.supabaseKey!==prevSupaKey){supa=null;initSupabase();}
  render();toast('Impostazioni salvate','ok');
}

/* ---- cadence & templates ---- */
function openCadence(){
  const cad=state.cadence;const tp=state.templates;
  modal(`<div class="modal wide" onclick="event.stopPropagation()">
    <div class="modal-h"><h3>Cadenza & template</h3><div class="x" onclick="closeModal()">✕</div></div>
    <div class="modal-b">
      <div class="field-lbl" style="margin:0">Sequenza di follow-up</div>
      <div class="helptip">Giorni = scarto dalla prima email (giorno 0). I weekend vengono saltati se attivo.</div>
      <div id="cad-list">
        ${cad.map((s,i)=>`<div class="cad-step">
          <input value="${escAttr(s.nome)}" data-i="${i}" data-k="nome" placeholder="Nome step">
          <input type="number" value="${s.offset}" data-i="${i}" data-k="offset" placeholder="giorno">
          <button class="x" onclick="rmStep(${i})" ${i===0?'style="visibility:hidden"':''}>✕</button>
        </div>`).join('')}
      </div>
      <button class="btn sm" onclick="addStep()"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Aggiungi step</button>

      <div class="section-h" style="margin:6px 0 0"><h3 style="font-size:14px">Tono & firma</h3><div class="line"></div></div>
      <div class="form-row"><label>Tono / stile (istruzioni per l'AI)</label>
        <textarea id="tp-tono">${esc(tp.tono)}</textarea></div>
      <div class="two-col">
        <div class="form-row"><label>Mittente (firma)</label><input id="tp-mit" value="${escAttr(tp.mittente)}"></div>
        <div class="form-row"><label>Azienda</label><input id="tp-az" value="${escAttr(tp.azienda)}"></div>
      </div>
      <div class="form-row"><label>Riga di disiscrizione</label><input id="tp-dis" value="${escAttr(tp.disiscrizione)}"></div>

      <div class="section-h" style="margin:6px 0 0"><h3 style="font-size:14px">Firma & formato email</h3><div class="line"></div></div>
      <label class="toggle ${state.config.formatoHtml?'on':''}" id="tp-html" onclick="this.classList.toggle('on')"><span class="sw"></span>
        <span><b>Invia in formato HTML</b><br><span class="hint">Necessario per la firma con logo e link colorati. Se spento, le email partono in solo testo (spesso meglio per la consegna a freddo).</span></span></label>
      <div class="form-row"><label>URL del logo <span class="hint">(immagine pubblica, es. caricata sul tuo repo GitHub Pages)</span></label>
        <input id="tp-logo" value="${escAttr(tp.logoUrl||'')}" placeholder="https://callforusit-aam.github.io/.../logo.png"></div>
      <div class="form-row"><label>Firma — versione HTML <span class="hint">(usa <span class="kbd">{logo_block}</span> dove vuoi il logo)</span></label>
        <textarea id="tp-sightml" style="min-height:130px;font-family:'JetBrains Mono',monospace;font-size:12px">${esc(tp.firmaHtml||'')}</textarea>
        <button class="btn sm ghost" style="align-self:flex-start" onclick="previewSig()">Anteprima firma</button></div>
      <div class="form-row"><label>Firma — versione testo <span class="hint">(usata in modalità solo testo e come fallback)</span></label>
        <textarea id="tp-sigtesto" style="min-height:80px">${esc(tp.firmaTesto||'')}</textarea></div>

      <div class="section-h" style="margin:6px 0 0"><h3 style="font-size:14px">Prompt di generazione AI</h3><div class="line"></div></div>
      <div class="helptip">Questo è il prompt di sistema che guida l'AI. Puoi usare i segnaposto <span class="kbd">{azienda}</span> <span class="kbd">{mittente}</span> <span class="kbd">{tono}</span> <span class="kbd">{regole_oggetto}</span> <span class="kbd">{regole_corpo}</span>: vengono sostituiti automaticamente. Deve sempre chiedere una risposta in JSON con <span class="kbd">oggetto</span> e <span class="kbd">corpo</span>.</div>
      <div class="form-row"><label>Prompt di sistema</label>
        <textarea id="tp-prompt" style="min-height:170px;font-family:'JetBrains Mono',monospace;font-size:12.5px">${esc(tp.promptSistema||'')}</textarea>
        <button class="btn sm ghost" style="align-self:flex-start" onclick="document.getElementById('tp-prompt').value=PROMPT_SISTEMA_DEFAULT">Ripristina default</button></div>
      <div class="two-col">
        <div class="form-row"><label>Regole per l'OGGETTO</label><textarea id="tp-rogg" style="min-height:80px">${esc(tp.regoleOggetto||'')}</textarea></div>
        <div class="form-row"><label>Regole per il CORPO</label><textarea id="tp-rcorpo" style="min-height:80px">${esc(tp.regoleCorpo||'')}</textarea></div>
      </div>

      <div class="field-lbl" style="margin:0">Angolo per ogni step</div>
      ${cad.map((s,i)=>`<div class="form-row"><label>${esc(s.nome)}</label><textarea data-ai="${i}" style="min-height:60px">${esc(s.angolo||'')}</textarea></div>`).join('')}
    </div>
    <div class="modal-f">
      <button class="btn" onclick="openSettings()">← Indietro</button>
      <button class="btn primary" onclick="saveCadence()">Salva</button>
    </div>
  </div>`);
}
function previewSig(){
  const url=(document.getElementById('tp-logo')?.value||'').trim();
  const html=(document.getElementById('tp-sightml')?.value||'');
  const logo=url?`<img src="${escAttr(url)}" alt="logo" width="60" style="display:block;border:0">`:'<span style="color:#bbb;font-size:11px">[logo: aggiungi un URL]</span>';
  const rendered=html.replace(/{logo_block}/g,logo).replace(/{logo_url}/g,url);
  const ov=document.createElement('div');
  ov.className='overlay';ov.style.zIndex='60';
  ov.onclick=(e)=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h"><h3>Anteprima firma</h3><div class="x" onclick="this.closest('.overlay').remove()">✕</div></div>
    <div class="modal-b">
      <div class="helptip">Così apparirà in fondo alle email inviate in formato HTML.</div>
      <div style="background:#ffffff;border:1px solid var(--border);border-radius:10px;padding:18px">${rendered}</div>
    </div>
    <div class="modal-f"><button class="btn primary" onclick="this.closest('.overlay').remove()">Chiudi</button></div>
  </div>`;
  document.body.appendChild(ov);
}
function addStep(){state.cadence.push({nome:'Follow-up '+state.cadence.length,offset:(state.cadence.at(-1)?.offset||0)+7,angolo:''});openCadence()}
function rmStep(i){state.cadence.splice(i,1);openCadence()}
function saveCadence(){
  document.querySelectorAll('#cad-list [data-k]').forEach(el=>{
    const i=+el.dataset.i,k=el.dataset.k;state.cadence[i][k]=k==='offset'?(+el.value||0):el.value;
  });
  document.querySelectorAll('[data-ai]').forEach(el=>{state.cadence[+el.dataset.ai].angolo=el.value});
  state.templates.tono=document.getElementById('tp-tono').value;
  state.templates.mittente=document.getElementById('tp-mit').value;
  state.templates.azienda=document.getElementById('tp-az').value;
  state.templates.disiscrizione=document.getElementById('tp-dis').value;
  state.config.formatoHtml=document.getElementById('tp-html').classList.contains('on');
  state.templates.logoUrl=document.getElementById('tp-logo').value.trim();
  state.templates.firmaHtml=document.getElementById('tp-sightml').value;
  state.templates.firmaTesto=document.getElementById('tp-sigtesto').value;
  state.templates.promptSistema=document.getElementById('tp-prompt').value;
  state.templates.regoleOggetto=document.getElementById('tp-rogg').value;
  state.templates.regoleCorpo=document.getElementById('tp-rcorpo').value;
  persist();closeModal();render();toast('Cadenza salvata','ok');
}

/* =======================================================
   DEMO + UTIL
   ======================================================= */

  const demo=[
    ['QUESTIONE DI GUSTO SRL','BRESCIA, BS','info@questionedigusto.net','una curiosità'],
    ['OMIFER SRL','CAZZAGO SAN MARTINO, BS','sales@omifer.it','una domanda sui preventivi'],
    ['FOKER SRL','TORBOLE CASAGLIA, BS','info@foker.com','le rubo un minuto'],
    ['GRAFICA SETTE SRL SB','BAGNOLO MELLA, BS','info@seventyseven.biz','una curiosità sui preventivi'],
    ['LECAPITAINE ITALIA SRL','RIVALTA DI TORINO, TO','info@icytruck.it','una domanda sugli allestimenti'],
    ['TEKNOFERR SRL','GIVOLETTO, TO','amministrazione@teknoferr.it','le rubo due minuti'],
    ['F.I.F.P.E. SRL','BAIRO, TO','info@fifpe.it','una curiosità'],
  ];
  demo.forEach(([az,sede,email,ogg])=>state.contacts.push(mkContact({
    azienda:az,sede,email,oggettoBase:ogg,
    corpoBase:`Buongiorno,\n\nmi occupo di automazione dei processi per piccole aziende manifatturiere della zona. Le scrivo perché in realtà come la vostra la preparazione di preventivi e ordini spesso pesa a mano su poche persone.\n\nSe da voi fila già tutto liscio, mi scusi il disturbo. Altrimenti le mostro volentieri come si alleggerisce.\n\nLe va?\n\nGiuseppe Romano\nFlowLine`,
    tipoAsset:'automazione preventivi e ordini',settore:'manifatturiero',
  })));
  persist();render();toast('7 contatti di esempio caricati','ok');
}
function pickFile(){document.getElementById('fileInput').click()}
document.getElementById('fileInput').addEventListener('change',e=>{const f=e.target.files[0];if(f)handleFile(f);e.target.value=''});

function chip(st){return `<span class="chip ${st.key}"><span class="d"></span>${st.label}</span>`}
function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function escAttr(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(msg,type=''){
  const el=document.createElement('div');el.className='toast '+type;
  el.innerHTML=`<span>${esc(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(20px)';setTimeout(()=>el.remove(),200)},3200);
}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');const nx=cur==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',nx);save(LS.theme,nx)}
function openRail(){document.getElementById('rail').classList.add('open');document.getElementById('scrim').classList.add('show')}
function closeRail(){document.getElementById('rail').classList.remove('open');document.getElementById('scrim').classList.remove('show')}

/* search debounce binding (delegated) */
document.addEventListener('input',e=>{
  if(e.target.id==='searchInput'){state.search=e.target.value;clearTimeout(window._st);window._st=setTimeout(()=>{render();const i=document.getElementById('searchInput');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}},220)}
});

/* keyboard: i = import, c = coda */
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea,select'))return;
  if(e.key==='i')pickFile();
  if(e.key==='c')go('coda');
  if(e.key==='d')go('dashboard');
});

/* ---- boot ---- */
(function boot(){
  const th=load(LS.theme,null)||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',th);
  initGoogle();
  // ripristina la sessione Google salvata; se scaduta, tenta un rinnovo silenzioso
  if(state.config.googleClientId){
    if(googleReady()){ scheduleRefresh(); setTimeout(()=>afterGoogleAuth(),300); }
    else if(state.google.email){ setTimeout(()=>refreshToken(),800); }
  }
  initSupabase();
  render();
})();
</script>
