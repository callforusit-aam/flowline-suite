<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowLine Outbound — Gestione campagne</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f6f6f3; --surface:#ffffff; --surface-2:#fbfbf9; --border:#e6e4dd;
  --text:#1b1b19; --muted:#73726c; --faint:#a3a29b;
  --accent:#4f46e5; --accent-soft:#eef0ff; --accent-2:#0d9488;
  --ok:#16a34a; --ok-soft:#e7f6ec; --warn:#d97706; --warn-soft:#fdf2e3;
  --late:#dc2626; --late-soft:#fdecea; --wait:#2563eb; --wait-soft:#e9f0ff;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
}
[data-theme="dark"]{
  --bg:#16161a; --surface:#1f1f25; --surface-2:#26262d; --border:#33333c;
  --text:#ededf0; --muted:#9a9aa3; --faint:#6a6a73;
  --accent:#7c75f5; --accent-soft:#26243d; --accent-2:#2dd4bf;
  --ok:#4ade80; --ok-soft:#16291c; --warn:#fbbf24; --warn-soft:#2c2310;
  --late:#f87171; --late-soft:#2c1514; --wait:#60a5fa; --wait-soft:#13233f;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
a{color:var(--accent)}

/* layout */
.app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
.rail{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{padding:20px 18px 14px;display:flex;align-items:center;gap:10px}
.brand .logo{
  width:30px;height:30px;border-radius:8px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.brand .logo svg{width:18px;height:18px}
.brand h1{font-size:15px;font-weight:650;letter-spacing:-.01em;line-height:1.1}
.brand .sub{font-size:11px;color:var(--faint);font-weight:500}
.nav{padding:8px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav button{
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-sm);
  color:var(--muted);font-weight:550;font-size:13.5px;text-align:left;width:100%;
  transition:background .12s,color .12s;
}
.nav button:hover{background:var(--surface-2);color:var(--text)}
.nav button.active{background:var(--accent-soft);color:var(--accent)}
.nav button .ico{width:17px;height:17px;flex:0 0 auto;opacity:.9}
.nav button .badge{margin-left:auto;font-size:11px;font-weight:650;background:var(--accent);color:#fff;
  min-width:19px;height:19px;border-radius:10px;padding:0 6px;display:flex;align-items:center;justify-content:center}
.nav button.active .badge{background:var(--accent)}
.nav .badge.late{background:var(--late)}
.rail-foot{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.conn-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:6px 8px;border-radius:8px;background:var(--surface-2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:0 0 auto}
.dot.on{background:var(--ok)}
.dot.warn{background:var(--warn)}
.rail-foot button.mini{font-size:12px;color:var(--muted);padding:7px 8px;border-radius:8px;text-align:left;display:flex;align-items:center;gap:8px}
.rail-foot button.mini:hover{background:var(--surface-2);color:var(--text)}
.spend-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);padding:7px 9px;border-radius:8px;background:var(--accent-soft);border:1px solid transparent;width:100%;font-weight:600}
.spend-pill:hover{border-color:var(--accent)}
.spend-pill .ico{width:14px;height:14px;color:var(--accent);flex:0 0 auto}
.spend-pill .spend-gen{margin-left:auto;font-size:11px;color:var(--muted);font-weight:500}
.spend-table{width:100%;font-size:13px;border-collapse:collapse}
.spend-table td{padding:7px 0;border-bottom:1px solid var(--border)}
.spend-table td:last-child{text-align:right;font-weight:600}
.spend-table tr:last-child td{border:none}
.spend-big{font-size:30px;font-weight:700;letter-spacing:-.02em}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
  padding:14px 26px;display:flex;align-items:center;gap:14px;
}
.topbar h2{font-size:18px;font-weight:650;letter-spacing:-.015em}
.topbar .crumb{color:var(--faint);font-size:13px}
.topbar .spacer{flex:1}
.content{padding:22px 26px 60px;max-width:1180px;width:100%}

/* generic ui */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:9px;
  font-weight:600;font-size:13px;background:var(--surface);border:1px solid var(--border);
  color:var(--text);transition:all .12s;
}
.btn:hover{background:var(--surface-2);border-color:var(--faint)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{color:var(--late);border-color:transparent}
.btn.danger:hover{background:var(--late-soft)}
.btn.sm{padding:6px 10px;font-size:12px;gap:5px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn .ico{width:15px;height:15px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}

/* dashboard stats */
.stats{grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{padding:16px 18px;position:relative;overflow:hidden}
.stat .k{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.stat .v{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-top:7px;line-height:1}
.stat .meta{font-size:12px;color:var(--faint);margin-top:5px}
.stat .accent-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.stat.today .accent-bar{background:var(--accent)}
.stat.wait .accent-bar{background:var(--wait)}
.stat.reply .accent-bar{background:var(--ok)}
.stat.late .accent-bar{background:var(--late)}

.section-h{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
.section-h h3{font-size:15px;font-weight:650}
.section-h .count{font-size:12px;color:var(--faint);font-weight:600}
.section-h .line{flex:1;height:1px;background:var(--border)}

/* table */
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:600;color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
  padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface-2);position:sticky;top:0}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
.az{font-weight:600}
.email-cell{color:var(--muted);font-size:12px}

/* status chip */
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.chip .d{width:6px;height:6px;border-radius:50%}
.chip.da{background:var(--surface-2);color:var(--muted)} .chip.da .d{background:var(--faint)}
.chip.plan{background:#f3eaff;color:#7c3aed} .chip.plan .d{background:#7c3aed}
[data-theme="dark"] .chip.plan{background:#2a2140;color:#c4b5fd} [data-theme="dark"] .chip.plan .d{background:#c4b5fd}
.chip.seq{background:var(--accent-soft);color:var(--accent)} .chip.seq .d{background:var(--accent)}
.chip.wait{background:var(--wait-soft);color:var(--wait)} .chip.wait .d{background:var(--wait)}
.chip.reply{background:var(--ok-soft);color:var(--ok)} .chip.reply .d{background:var(--ok)}
.chip.done{background:var(--surface-2);color:var(--faint)} .chip.done .d{background:var(--faint)}
.chip.stop{background:var(--late-soft);color:var(--late)} .chip.stop .d{background:var(--late)}
.chip.late{background:var(--late-soft);color:var(--late)} .chip.late .d{background:var(--late)}
.chip.today{background:var(--warn-soft);color:var(--warn)} .chip.today .d{background:var(--warn)}

.step-pill{font-size:11px;font-weight:650;color:var(--accent-2);background:color-mix(in srgb,var(--accent-2) 12%,transparent);padding:2px 7px;border-radius:6px}

/* queue cards */
.queue-card{padding:0;overflow:hidden;margin-bottom:14px}
.qc-head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.qc-head .az{font-size:14px}
.qc-head .meta{font-size:12px;color:var(--muted)}
.qc-head .spacer{flex:1}
.qc-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.field-lbl{font-size:11px;font-weight:650;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.field-lbl .cnt{margin-left:auto;font-weight:600;color:var(--faint);text-transform:none;letter-spacing:0}
input.subj,textarea.body{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 11px;resize:vertical}
input.subj:focus,textarea.body:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea.body{min-height:150px;line-height:1.55;white-space:pre-wrap;font-size:13.5px}
.qc-foot{display:flex;align-items:center;gap:9px;padding:0 16px 14px;flex-wrap:wrap}
.qc-foot .spacer{flex:1}
.preview-note{font-size:12px;color:var(--faint);display:flex;align-items:center;gap:6px}

/* agenda */
.agenda-col{margin-bottom:20px}
.agenda-day{display:flex;align-items:baseline;gap:10px;margin-bottom:9px}
.agenda-day .dnum{font-size:22px;font-weight:700;letter-spacing:-.02em}
.agenda-day .dname{font-size:13px;color:var(--muted);font-weight:600;text-transform:capitalize}
.agenda-day .dcount{margin-left:auto;font-size:12px;color:var(--faint);font-weight:600}
.agenda-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:7px}
.agenda-row:hover{border-color:var(--faint)}
.agenda-row .az{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agenda-row .when{font-size:12px;color:var(--muted);white-space:nowrap}

/* suite module switcher */
.modswitch{display:flex;gap:4px;padding:8px 10px 4px}
.modswitch button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 6px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--border)}
.modswitch button svg{width:14px;height:14px}
.modswitch button.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* shifts */
.sh-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;display:inline-block}
.sh-m{display:flex;gap:7px;align-items:flex-start;padding:5px 6px;border-radius:7px}
.sh-m:hover{background:var(--surface-2)}
.sh-m-body{min-width:0;flex:1}
.sh-name{font-size:12px;font-weight:600;line-height:1.3}
.sh-blocks{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.sh-chip{font-size:11px;font-weight:600;background:var(--accent-soft);color:var(--accent);padding:2px 6px;border-radius:6px;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.sh-chip[onclick]{cursor:pointer}
.sh-chip[onclick]:hover{background:var(--late-soft);color:var(--late)}
.sh-chip.edit{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);color:var(--text)}
.sh-chip.edit button{color:var(--faint);font-weight:700;font-size:12px}
.sh-chip.edit button:hover{color:var(--late)}
.sh-busy{font-size:10.5px;color:var(--late);margin-top:3px;font-weight:600;background:var(--late-soft);padding:1px 5px;border-radius:5px;display:inline-block;font-family:'JetBrains Mono',monospace}
.sh-nofree{font-size:10.5px;color:var(--faint);margin-top:2px;font-style:italic}
.mp-day{display:grid;grid-template-columns:110px 1fr auto;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.mp-day:last-child{border-bottom:none}
.mp-dname{font-size:13px;font-weight:600}
.mp-blocks{display:flex;flex-wrap:wrap;gap:5px}
.mp-none{font-size:12px;color:var(--faint)}
.mp-add{display:flex;align-items:center;gap:5px}
.mp-add input[type=time]{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:5px 7px;font-size:12px}
.ex-add{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ex-add input,.ex-add select{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;font-size:13px}
.ex-whole{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.ex-row{display:flex;align-items:center;gap:10px;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px}
.cal-pick{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px}
.cal-pick:hover{background:var(--surface-2)}
.cal-pick input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.cal-sw{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.cal-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-role{font-size:10.5px;color:var(--faint);white-space:nowrap}
/* editing avanzato */
.sh-chip.edit .chip-t{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text);padding:0}
.sh-chip.edit .chip-t:hover{color:var(--accent);text-decoration:underline}
.mp-dname{display:flex;align-items:center;gap:8px}
.mp-clear{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.03em}
.mp-clear:hover{color:var(--late)}
.cal-cell-h.zoom{cursor:pointer}
.cal-cell-h.zoom:hover{background:var(--accent-soft)}
.cal-cell-h.zoom:hover .cal-zoom{opacity:1}
.cal-zoom{width:13px;height:13px;opacity:0;color:var(--accent);transition:opacity .12s}
/* vista giorno stile calendario */
.gc-card{padding:0;overflow:hidden}
.gc-grid{display:flex;overflow-x:auto}
.gc-gutter{flex:0 0 var(--gutter);position:sticky;left:0;z-index:4;background:var(--surface);border-right:1px solid var(--border)}
.gc-gutter-h{height:56px;border-bottom:1px solid var(--border)}
.gc-gutter-b{position:relative}
.gc-hl{position:absolute;right:8px;transform:translateY(-50%);font-size:10.5px;color:var(--faint);font-family:'JetBrains Mono',monospace;font-weight:600;white-space:nowrap}
.gc-now-lbl{position:absolute;right:4px;transform:translateY(-50%);font-size:9.5px;font-weight:700;color:#fff;background:var(--late);border-radius:4px;padding:1px 4px;font-family:'JetBrains Mono',monospace;z-index:5}
.gc-cols{display:flex;flex:1;min-width:0}
.gc-col{flex:1;min-width:150px;border-right:1px solid var(--border)}
.gc-col:last-child{border-right:none}
.gc-col-h{height:56px;padding:8px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:2px;background:var(--surface-2);position:sticky;top:0;z-index:3}
.gc-col-h.mine{background:var(--accent-soft)}
.gc-col-h .sh-dot{position:absolute;top:10px;right:10px}
.gc-col-n{font-size:13px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-col-s{font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.gc-busy-n{color:var(--late)}
.gc-track{position:relative;background:var(--surface)}
.gc-line{position:absolute;left:0;right:0;height:1px;background:var(--border);opacity:.6}
.gc-ev{position:absolute;left:4px;right:4px;border-radius:6px;padding:3px 7px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;z-index:2}
.gc-ev-t{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap;line-height:1.3}
.gc-ev-s{font-size:10px;font-weight:600;opacity:.85;white-space:nowrap;line-height:1.2}
.gc-ev.free{background:color-mix(in srgb,var(--c) 18%,var(--surface));border-left:3px solid var(--c);color:var(--c)}
[data-theme="dark"] .gc-ev.free{background:color-mix(in srgb,var(--c) 30%,var(--surface));color:#fff}
.gc-ev.free.mine{cursor:pointer}
.gc-ev.free.mine:hover{background:color-mix(in srgb,var(--c) 32%,var(--surface));box-shadow:0 2px 8px rgba(0,0,0,.1)}
.gc-ev.busy{z-index:3;background:repeating-linear-gradient(135deg,var(--late-soft) 0 7px,color-mix(in srgb,var(--late) 22%,var(--surface)) 7px 14px);
  border-left:3px solid var(--late);color:var(--late);left:14px}
.gc-lock{font-size:9px;line-height:1}
.gc-noavail{position:absolute;left:4px;right:4px;border-radius:6px;background:repeating-linear-gradient(45deg,var(--border) 0 6px,transparent 6px 12px);opacity:.5;
  display:flex;align-items:center;justify-content:center}
.gc-noavail span{font-size:11px;color:var(--muted);font-weight:600;background:var(--surface);padding:2px 8px;border-radius:6px;border:1px solid var(--border)}
.gc-now{position:absolute;left:0;right:0;height:2px;background:var(--late);z-index:5}
.gc-now::before{content:'';position:absolute;left:-1px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--late)}
.lg-free{width:16px;height:10px;border-radius:3px;background:color-mix(in srgb,var(--accent) 18%,var(--surface));border-left:3px solid var(--accent);display:inline-block}
.lg-busy{width:16px;height:10px;border-radius:3px;display:inline-block;border-left:3px solid var(--late);
  background:repeating-linear-gradient(135deg,var(--late-soft) 0 4px,color-mix(in srgb,var(--late) 22%,var(--surface)) 4px 8px)}
.lg-none{width:16px;height:10px;border-radius:3px;display:inline-block;background:repeating-linear-gradient(45deg,var(--border) 0 4px,transparent 4px 8px);border:1px solid var(--border)}
@media(max-width:840px){.gc-col{min-width:120px}.gc-col-n{font-size:12px}}
@media(max-width:840px){.mp-day{grid-template-columns:1fr;gap:6px}}

/* planning */
.load-strip{display:flex;gap:8px;align-items:stretch}
.load-cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 4px;border-radius:9px}
.load-cell.today{background:var(--accent-soft)}
.load-d{font-size:11px;color:var(--muted);text-align:center;text-transform:capitalize;line-height:1.2}
.load-cell.today .load-d{color:var(--accent)}
.load-bar-wrap{width:26px;height:70px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:flex-end;overflow:hidden}
.load-bar{width:100%;background:var(--accent);border-radius:0 0 5px 5px;min-height:2px;transition:height .2s}
.load-bar.over{background:var(--late)}
.load-n{font-size:12px;font-weight:700}
.load-n.over{color:var(--late)}
.plan-bar{padding:12px 16px;margin-bottom:14px;display:flex;flex-direction:column;gap:10px}
.plan-bar-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.plan-sel-info{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
.plan-sel-info b{color:var(--accent);font-size:15px}
.plan-group{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px;color:var(--muted)}
.plan-lbl{font-size:11px;font-weight:650;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);margin-right:2px}
.plan-bar input[type=date],.plan-bar input[type=number]{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:6px 9px}
.table-wrap input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.table-wrap input[type=date]{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px}

/* calendar grid */
.cal-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cal-title{flex:1;text-align:center;display:flex;flex-direction:column;line-height:1.25}
.cal-title b{font-size:15px;text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;min-height:190px;display:flex;flex-direction:column;overflow:hidden}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.cal-cell.wknd{background:var(--surface-2)}
.cal-cell.past{opacity:.62}
.cal-cell-h{display:flex;align-items:center;gap:6px;padding:7px 9px;border-bottom:1px solid var(--border)}
.cal-dname{font-size:11px;color:var(--muted);font-weight:600;text-transform:capitalize}
.cal-dnum{font-size:14px;font-weight:700;margin-left:auto}
.cal-cell.today .cal-dnum{color:var(--accent)}
.cal-count{font-size:10px;font-weight:700;background:var(--accent-soft);color:var(--accent);min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;margin-left:0}
.cal-count.late{background:var(--late-soft);color:var(--late)}
.cal-items{padding:6px;display:flex;flex-direction:column;gap:4px;overflow:auto;flex:1}
.cal-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface-2)}
.cal-item:hover{background:var(--accent-soft)}
.cal-dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.cal-az{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.cal-more{font-size:11px;color:var(--muted);padding:2px 6px;font-weight:600}
.cal-empty{font-size:13px;color:var(--faint);text-align:center;padding:8px 0}
.cal-legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:14px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--muted);font-weight:500}
.cal-leg{display:flex;align-items:center;gap:6px}
@media(max-width:840px){
  .cal-grid{grid-template-columns:repeat(7,minmax(110px,1fr));overflow-x:auto;padding-bottom:6px}
  .cal-cell{min-height:120px}
}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ico{width:40px;height:40px;margin:0 auto 14px;opacity:.4}
.empty h4{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty p{font-size:13px;max-width:380px;margin:0 auto 16px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:560px;max-height:88vh;overflow:auto}
.modal.wide{max-width:760px}
.modal-h{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.modal-h h3{font-size:16px;font-weight:650;flex:1}
.modal-b{padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.modal-f{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}
.x{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.x:hover{background:var(--surface-2)}

.form-row{display:flex;flex-direction:column;gap:6px}
.form-row label{font-size:12.5px;font-weight:600;color:var(--text)}
.form-row .hint{font-size:11.5px;color:var(--faint);font-weight:400}
.form-row input,.form-row select,.form-row textarea{
  background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;width:100%;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.form-row textarea{min-height:90px;resize:vertical;line-height:1.5}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.toggle .sw{width:38px;height:22px;border-radius:12px;background:var(--border);position:relative;transition:.15s;flex:0 0 auto}
.toggle .sw::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .sw{background:var(--accent)}
.toggle.on .sw::after{left:18px}

/* cadence editor */
.cad-step{display:grid;grid-template-columns:1fr 110px 34px;gap:10px;align-items:center;margin-bottom:8px}
.cad-step input{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}

/* mapping */
.map-row{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.map-row:last-child{border:none}
.map-row .lbl{font-size:13px;font-weight:600}
.map-row .lbl small{display:block;font-weight:400;color:var(--faint);font-size:11px}

/* toast */
.toasts{position:fixed;bottom:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;
  padding:11px 15px;box-shadow:var(--shadow);font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;
  min-width:240px;max-width:360px;animation:slidein .2s}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--late)} .toast.warn{border-left-color:var(--warn)}
@keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

.test-banner{background:var(--warn-soft);color:var(--warn);font-size:12px;font-weight:600;padding:6px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}

.filters{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 11px}
.search input{background:none;border:none;flex:1;outline:none}
.fbtn{padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border)}
.fbtn.on{background:var(--accent-soft);color:var(--accent);border-color:transparent}

.spinner{width:15px;height:15px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning svg{animation:spin .6s linear infinite}

.kbd{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:1px 5px;color:var(--muted)}
.helptip{font-size:12px;color:var(--faint);line-height:1.5}

@media(max-width:840px){
  .app{grid-template-columns:1fr}
  .rail{position:fixed;left:0;top:0;width:232px;z-index:40;transform:translateX(-100%);transition:.2s}
  .rail.open{transform:none}
  .stats{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .content{padding:18px 16px 60px}
  .topbar{padding:12px 16px}
  .menu-btn{display:flex!important}
}
.menu-btn{display:none;width:34px;height:34px;border-radius:8px;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--surface)}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
.scrim.show{display:block}
</style>
</head>

<script>
/* ============================================================
   FlowLine Suite — single file
   ============================================================ */

/* ┌──────────────────────────────────────────────────────────┐
   │  CONFIGURAZIONE TEAM — compila QUI una volta sola.        │
   │  Così ogni collaboratore apre il link e trova tutto       │
   │  pronto: nessuna chiave da incollare.                     │
   │  (URL e chiavi qui sotto sono pubbliche per progetto:     │
   │   la anon key di Supabase e il Client ID Google sono      │
   │   pensati per stare nel browser.)                         │
   └──────────────────────────────────────────────────────────┘ */
const APP_DEFAULTS = {
  supabaseUrl:    'https://adaaubcarnczlmenfwam.supabase.co',
  supabaseKey:    'sb_publishable_0a_ioaj4iiT3MlzUKR2XyQ_-PYHrQPP',
  googleClientId: '183110262616-3rd20u12hlmns50h48rant26c7clurpk.apps.googleusercontent.com',
};
/* La chiave Anthropic NON va qui: è personale e a consumo.
   Resta nelle Impostazioni del singolo (serve solo per l'Outbound). */

const LS = {
  config:'flo_config', contacts:'flo_contacts', cadence:'flo_cadence',
  templates:'flo_templates', theme:'flo_theme', usage:'flo_usage', gauth:'flo_gauth'
};
const MODEL = 'claude-sonnet-4-6';
const PRICE = {in:3, out:15}; // USD per 1M token — Claude Sonnet 4.6
const EUR_DEFAULT = 0.92;     // USD→EUR di riferimento (modificabile)
const STEPS_DEFAULT = [
  {nome:'Email 1', offset:0, angolo:'Primo contatto a freddo. Apertura, motivo del contatto, una singola domanda. Tono diretto e umano, niente vendita aggressiva.'},
  {nome:'Follow-up 1', offset:3, angolo:'Promemoria leggero in risposta alla prima mail. Aggiunge UN esempio concreto/caso reale. Breve.'},
  {nome:'Follow-up 2', offset:7, angolo:'Penultimo tentativo. Cambia angolo: spostati sul beneficio principale, una riga, bassa pressione.'},
  {nome:'Follow-up 3', offset:14, angolo:'Ultimo contatto (break-up). Chiude con gentilezza, lascia la porta aperta, nessuna insistenza.'},
];
const PROMPT_SISTEMA_DEFAULT = `Sei un assistente che scrive email di outreach B2B a freddo in italiano per {azienda}.
Tono richiesto: {tono}
Regole generali: testo semplice (no HTML, no markdown, no liste puntate). Nessun oggetto sensazionalistico o spammy. Una sola call-to-action. Non inventare dati specifici sull'azienda destinataria che non conosci. Firma a nome di {mittente}.

{regole_oggetto}
{regole_corpo}

Rispondi SOLO con JSON valido, nessun testo prima o dopo, nel formato: {"oggetto":"...","corpo":"..."}`;
const TEMPLATES_DEFAULT = {
  tono:'Diretto, umano, conversazionale, in italiano. Frasi brevi. Niente gergo da marketing, niente superlativi, nessun "soluzione innovativa". Si firma "Giuseppe Romano — FlowLine".',
  mittente:'Giuseppe Romano',
  azienda:'FlowLine',
  promptSistema: PROMPT_SISTEMA_DEFAULT,
  regoleOggetto:'OGGETTO: massimo 6-7 parole, in minuscolo, curioso ma sobrio. Niente nomi azienda forzati, niente punti esclamativi.',
  regoleCorpo:'CORPO: massimo ~130 parole. Apri con un aggancio concreto, una sola domanda di chiusura. Niente parolone.',
  disiscrizione:'Se non desidera ricevere altre comunicazioni, risponda a questa mail con un NO e non la contatterò più.',
  logoUrl:'',
  firmaTesto:'Il Team FlowLine\nFlowLine | Automazioni e Agenti AI per Aziende\nT: +39 3492977533 | E: info@flowline.it\nW: www.flowline.it',
  firmaHtml:`<table cellpadding="0" cellspacing="0" style="font-family:Arial,Helvetica,sans-serif;color:#222222"><tr>
<td style="padding-right:14px;border-right:2px solid #e2e2e2;vertical-align:middle">{logo_block}</td>
<td style="padding-left:14px;vertical-align:middle;font-size:13px;line-height:1.5">
<div style="font-weight:bold;font-size:15px;color:#1a1a1a">Il Team FlowLine</div>
<div style="margin:2px 0 6px"><a href="https://www.flowline.it" style="color:#1a4fd6;text-decoration:none;font-weight:bold">Info &amp; Contatti</a> <span style="color:#aaa">|</span> <b>FlowLine</b> <span style="color:#aaa">|</span> Automazioni e Agenti AI per Aziende</div>
<div style="color:#555"><b>T:</b> +39 3492977533 &nbsp;|&nbsp; <b>E:</b> <a href="mailto:info@flowline.it" style="color:#555;text-decoration:none">info@flowline.it</a></div>
<div style="color:#555;margin-top:2px"><b>W:</b> <a href="https://www.flowline.it" style="color:#1a4fd6;text-decoration:none">www.flowline.it</a> &nbsp;|&nbsp; <a href="https://www.linkedin.com" style="color:#1a4fd6;text-decoration:none">LinkedIn</a> &nbsp;|&nbsp; <a href="https://www.instagram.com" style="color:#1a4fd6;text-decoration:none">Instagram</a></div>
</td></tr></table>`
};

let state = {
  config: load(LS.config, {googleClientId:'', googleApiKey:'', anthropicKey:'', supabaseUrl:'', supabaseKey:'', sheetId:'', sheetTab:'', testMode:true, saltaWeekend:true, oraInizio:9, oraFine:18, maxAlGiorno:10, autoStopReply:true, eurRate:EUR_DEFAULT, autoSync:true, autoSyncSec:60, formatoHtml:false}),
  contacts: load(LS.contacts, []),
  cadence: load(LS.cadence, STEPS_DEFAULT),
  templates: load(LS.templates, TEMPLATES_DEFAULT),
  usage: load(LS.usage, {input:0, output:0, gen:0, since:new Date().toISOString().slice(0,10)}),
  view: 'dashboard',
  module: load('flo_module','outbound'),
  google: load(LS.gauth, {token:null, email:null, expires:0}),
  filter: 'tutti', search:'',
  shifts: {members:[], rules:[], exceptions:[], gcal:[], meId:null, week:0, day:null, view:'griglia', needsSetup:false},
};
// i valori del team valgono se il singolo non ne ha di propri
if(!state.config.supabaseUrl && APP_DEFAULTS.supabaseUrl) state.config.supabaseUrl=APP_DEFAULTS.supabaseUrl;
if(!state.config.supabaseKey && APP_DEFAULTS.supabaseKey) state.config.supabaseKey=APP_DEFAULTS.supabaseKey;
if(!state.config.googleClientId && APP_DEFAULTS.googleClientId) state.config.googleClientId=APP_DEFAULTS.googleClientId;
if(state.config.eurRate==null) state.config.eurRate=EUR_DEFAULT;
if(state.config.autoSync==null) state.config.autoSync=true;
if(state.config.autoSyncSec==null) state.config.autoSyncSec=60;
if(state.config.googleApiKey==null) state.config.googleApiKey='';
if(state.config.supabaseUrl==null) state.config.supabaseUrl='';
if(state.config.supabaseKey==null) state.config.supabaseKey='';
if(state.config.formatoHtml==null) state.config.formatoHtml=false;
if(!state.templates.promptSistema) state.templates.promptSistema=PROMPT_SISTEMA_DEFAULT;
if(state.templates.regoleOggetto==null) state.templates.regoleOggetto=TEMPLATES_DEFAULT.regoleOggetto;
if(state.templates.regoleCorpo==null) state.templates.regoleCorpo=TEMPLATES_DEFAULT.regoleCorpo;
if(state.templates.firmaTesto==null) state.templates.firmaTesto=TEMPLATES_DEFAULT.firmaTesto;
if(state.templates.firmaHtml==null) state.templates.firmaHtml=TEMPLATES_DEFAULT.firmaHtml;
if(state.templates.logoUrl==null) state.templates.logoUrl='';

/* ---------- storage helpers ---------- */
function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch(e){return def}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){toast('Spazio di archiviazione pieno','err')}}
function persist(){save(LS.config,state.config);save(LS.contacts,state.contacts);save(LS.cadence,state.cadence);save(LS.templates,state.templates);save(LS.usage,state.usage);schedulePush();}

/* ---------- cost / usage ---------- */
function costUSD(u){return (u.input/1e6*PRICE.in)+(u.output/1e6*PRICE.out)}
function costEUR(u){return costUSD(u)*(state.config.eurRate||EUR_DEFAULT)}
function recordUsage(inT,outT){
  state.usage.input+=(inT||0);state.usage.output+=(outT||0);state.usage.gen++;
  save(LS.usage,state.usage);renderSpend();
}
function fmtMoney(v){return v<0.01&&v>0 ? '<0,01' : v.toFixed(v<1?3:2).replace('.',',')}
function resetUsage(){if(!confirm('Azzerare il conteggio di spesa stimata?'))return;state.usage={input:0,output:0,gen:0,since:new Date().toISOString().slice(0,10)};save(LS.usage,state.usage);renderSpend();closeModal();toast('Conteggio azzerato','ok')}

/* ---------- date utils ---------- */
function today(){const d=new Date();d.setHours(0,0,0,0);return d}
function parseD(s){if(!s)return null;const p=String(s).slice(0,10).split('-');if(p.length===3&&p[0].length===4){const d=new Date(+p[0],+p[1]-1,+p[2]);d.setHours(0,0,0,0);return d}const d=new Date(s);d.setHours(0,0,0,0);return d}
function fmtD(d){if(!d)return '—';return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'})}
function fmtDLong(d){if(!d)return '—';return d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})}
function isoD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);x.setHours(0,0,0,0);return x}
function daysBetween(a,b){return Math.round((b-a)/86400000)}
function nextWorkday(d){if(!state.config.saltaWeekend)return d;let x=new Date(d);while(x.getDay()===0||x.getDay()===6)x=addDays(x,1);return x}
function sameDay(a,b){return a&&b&&a.getTime()===b.getTime()}

/* ---------- cadence engine ---------- */
// returns {dueDate, stepIndex, label} for the NEXT action, or null if no more action
function nextAction(c){
  if(c.haRisposto) return null;
  const step = c.step||0;
  if(step>=state.cadence.length) return null;
  const cad = state.cadence[step];
  let due;
  if(step===0){
    // prima email: parte solo se PIANIFICATA
    if(!c.scheduledDate) return null;            // backlog: da pianificare, non in coda
    due = nextWorkday(parseD(c.scheduledDate));
  } else {
    if(!c.anchorDate){ due = nextWorkday(today()); }
    else due = nextWorkday(addDays(parseD(c.anchorDate), cad.offset));
  }
  return {dueDate:due, stepIndex:step, label:cad.nome, cad};
}
function isUnplanned(c){return !c.haRisposto && (c.step||0)===0 && !c.scheduledDate}
function statusOf(c){
  if(c.haRisposto) return {key:'reply',label:'Ha risposto'};
  if((c.step||0)>=state.cadence.length) return {key:'done',label:'Sequenza conclusa'};
  if(c.fermato) return {key:'stop',label:'Fermato'};
  if(isUnplanned(c)) return {key:'plan',label:'Da pianificare'};
  const na = nextAction(c);
  if(!na) return {key:'done',label:'Concluso'};
  const t=today();
  if((c.step||0)===0){
    if(na.dueDate<t) return {key:'late',label:'In ritardo'};
    if(sameDay(na.dueDate,t)) return {key:'today',label:'Da inviare oggi'};
    return {key:'wait',label:'Pianificato '+fmtD(na.dueDate)};
  }
  // already in sequence (sent at least email1)
  if(na.dueDate<t) return {key:'late',label:'In ritardo'};
  if(sameDay(na.dueDate,t)) return {key:'today',label:'In coda oggi'};
  return {key:'wait',label:'In attesa'};
}
function isDue(c){ // due today or overdue, action pending
  if(c.haRisposto) return false;
  const na=nextAction(c); if(!na) return false;
  return na.dueDate<=today();
}
function dueToday(c){ // azione prevista esattamente oggi (incluse le prime email pronte)
  if(c.haRisposto) return false;
  const na=nextAction(c); if(!na) return false;
  return sameDay(na.dueDate,today());
}
function isLate(c){
  if(c.haRisposto) return false;
  const na=nextAction(c); if(!na) return false;
  return na.dueDate<today();
}

/* ---------- contact factory ---------- */
function mkContact(o){
  return {
    id: o.id || ('c'+Math.random().toString(36).slice(2,9)),
    n:o.n||'', azienda:o.azienda||'', sede:o.sede||'', email:(o.email||'').trim(),
    ruolo:o.ruolo||'', settore:o.settore||'', tipoAsset:o.tipoAsset||'',
    descrizione:o.descrizione||'', sitoWeb:o.sitoWeb||'',
    oggettoBase:o.oggettoBase||'', corpoBase:o.corpoBase||'',
    disiscrizione:o.disiscrizione||state.templates.disiscrizione,
    step:0, scheduledDate:null, anchorDate:null, dataUltimoInvio:null, haRisposto:false, fermato:false,
    threadId:null, messageId:null,
    drafts:{}, history:[],
  };
}

let tokenClient=null;
const SCOPES='https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly';

function googleReady(){return state.google.token && Date.now()<state.google.expires}
function saveGAuth(){save(LS.gauth,{token:state.google.token,email:state.google.email,expires:state.google.expires})}
let _refreshTimer=null;
function scheduleRefresh(){
  if(_refreshTimer)clearTimeout(_refreshTimer);
  const ms=state.google.expires-Date.now()-5*60*1000; // 5 min prima della scadenza
  if(ms>0)_refreshTimer=setTimeout(()=>refreshToken(),ms);
}

function initGoogle(){
  if(!state.config.googleClientId) return;
  if(typeof google==='undefined'||!google.accounts){setTimeout(initGoogle,400);return}
  try{
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: state.config.googleClientId,
      scope: SCOPES,
      callback: (resp)=>{
        if(resp.error){if(resp.error!=='interaction_required'&&resp.error!=='access_denied')toast('Autorizzazione Google: '+resp.error,'warn');renderConn();return}
        state.google.token=resp.access_token;
        state.google.expires=Date.now()+((resp.expires_in||3600)*1000);
        saveGAuth();scheduleRefresh();
        afterGoogleAuth();
      }
    });
  }catch(e){console.error(e)}
}
function connectGoogle(force){
  if(!state.config.googleClientId){openSettings();toast('Inserisci prima il Client ID Google','warn');return}
  if(!tokenClient) initGoogle();
  if(!tokenClient){toast('Google Identity non caricato, riprova','err');return}
  // force=true -> richiede di nuovo il consenso: serve quando si aggiungono nuovi permessi (es. calendario)
  tokenClient.requestAccessToken({prompt: (force||!state.google.email)?'consent':''});
}
function reauthGoogle(){
  state.google.token=null;state.google.expires=0;saveGAuth();
  toast('Riautorizza e concedi TUTTI i permessi richiesti','warn');
  connectGoogle(true);
}
function logoutGoogle(){
  if(!confirm('Uscire dall\'account Google? I turni restano salvati sul database.'))return;
  try{if(state.google.token&&google?.accounts?.oauth2)google.accounts.oauth2.revoke(state.google.token,()=>{});}catch(e){}
  state.google={token:null,email:null,expires:0};saveGAuth();
  state.shifts.meId=null;stopReplyPoll();
  closeModal();render();toast('Disconnesso','ok');
}

function refreshToken(){
  if(!tokenClient){initGoogle();}
  if(!tokenClient)return;
  try{ tokenClient.requestAccessToken({prompt:''}); }catch(e){}
}
async function afterGoogleAuth(){
  try{
    const r=await gfetch('https://gmail.googleapis.com/gmail/v1/users/me/profile');

function bindMe(){

  state.shifts.meId=found?found.id:null;

  if(found && found.gcal && !load('flo_tzfix',false)){
    save('flo_tzfix',true);
    setTimeout(()=>syncGcal({repair:true}),1200);
  }
}
async function gfetch(url,opts={}){
  if(!googleReady()){ // prova un refresh silenzioso al volo
    await new Promise(res=>{
      const prev=tokenClient&&tokenClient.callback;
      if(!tokenClient){res();return}
      let done=false;
      tokenClient.callback=(resp)=>{
        if(resp&&resp.access_token){state.google.token=resp.access_token;state.google.expires=Date.now()+((resp.expires_in||3600)*1000);saveGAuth();scheduleRefresh();}
        tokenClient.callback=prev;done=true;res();
      };
      try{tokenClient.requestAccessToken({prompt:''});}catch(e){res();}
      setTimeout(()=>{if(!done){tokenClient.callback=prev;res();}},3000);
    });
  }
  if(!googleReady()) throw new Error('Sessione Google scaduta, premi Riconnetti');
  const r=await fetch(url,{...opts,headers:{'Authorization':'Bearer '+state.google.token,'Content-Type':'application/json',...(opts.headers||{})}});
  if(r.status===401){state.google.token=null;state.google.expires=0;saveGAuth();renderConn();throw new Error('Sessione Google scaduta, riconnetti')}
  if(!r.ok){const t=await r.text();throw new Error('Google '+r.status+': '+t.slice(0,160))}
  return r.json();
}

/* ---- MIME build ---- */
function utf8b64(s){return btoa(unescape(encodeURIComponent(s)))}
function b64url(s){return s.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function encSubject(s){return /[^\x00-\x7F]/.test(s)?'=?UTF-8?B?'+utf8b64(s)+'?=':s}
function buildRaw({to,from,subject,body,inReplyTo,references}){
  const headers=[
    'From: '+from,
    'To: '+to,
    'Subject: '+encSubject(subject),
    'MIME-Version: 1.0',
    'Content-Type: text/plain; charset="UTF-8"',
  ];
  if(inReplyTo){headers.push('In-Reply-To: '+inReplyTo);headers.push('References: '+(references||inReplyTo));}
  const msg=headers.join('\r\n')+'\r\n\r\n'+body;
  return b64url(utf8b64(msg));
}
// multipart/alternative: testo semplice + HTML (firma e formattazione)
function buildRawHtml({to,from,subject,text,html,inReplyTo,references}){
  const b='flo'+Math.random().toString(36).slice(2,12);
  const headers=[
    'From: '+from,
    'To: '+to,
    'Subject: '+encSubject(subject),
    'MIME-Version: 1.0',
    'Content-Type: multipart/alternative; boundary="'+b+'"',
  ];
  if(inReplyTo){headers.push('In-Reply-To: '+inReplyTo);headers.push('References: '+(references||inReplyTo));}
  const parts=[
    '--'+b,
    'Content-Type: text/plain; charset="UTF-8"','',
    text,
    '--'+b,
    'Content-Type: text/html; charset="UTF-8"','',
    html,
    '--'+b+'--',''
  ].join('\r\n');
  const msg=headers.join('\r\n')+'\r\n\r\n'+parts;
  return b64url(utf8b64(msg));
}
function textToHtml(t){return esc(t).replace(/\r?\n/g,'<br>');}
function buildSigHtml(){
  const url=(state.templates.logoUrl||'').trim();
  const logo = url?`<img src="${escAttr(url)}" alt="logo" width="60" style="display:block;border:0">`:'';
  return (state.templates.firmaHtml||'').replace(/{logo_block}/g,logo).replace(/{logo_url}/g,url);
}

async function sendEmailGmail(c, step, subject, body){
  const unsub=(c.disiscrizione||state.templates.disiscrizione);
  const sigText=state.templates.firmaTesto||'';
  const textBody = body + (sigText?('\n\n'+sigText):'') + '\n\n— \n' + unsub;
  if(state.config.testMode){
    await new Promise(r=>setTimeout(r,500));
    return {threadId:c.threadId||('sim_'+c.id), messageId:c.messageId||('<sim-'+c.id+'-'+step+'@flowline>'), simulated:true};
  }
  const inReplyTo = step>0?c.messageId:null;
  let raw;
  if(state.config.formatoHtml){
    const sigHtml=buildSigHtml();
    const htmlBody=`<div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#222;line-height:1.55">`
      + textToHtml(body)
      + (sigHtml?('<br><br>'+sigHtml):'')
      + `<br><br><span style="color:#9a9a9a;font-size:12px">${esc(unsub)}</span></div>`;
    raw=buildRawHtml({to:c.email, from:state.google.email, subject, text:textBody, html:htmlBody, inReplyTo, references:inReplyTo});
  } else {
    raw=buildRaw({to:c.email, from:state.google.email, subject, body:textBody, inReplyTo, references:inReplyTo});
  }
  const payload={raw};
  if(step>0 && c.threadId) payload.threadId=c.threadId;
  const sent=await gfetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',body:JSON.stringify(payload)});
  // fetch message to read Message-ID header + threadId
  let messageId=c.messageId, threadId=sent.threadId;
  try{
    const full=await gfetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/'+sent.id+'?format=metadata&metadataHeaders=Message-ID');
    const h=(full.payload?.headers||[]).find(x=>x.name.toLowerCase()==='message-id');
    if(h && step===0) messageId=h.value;
  }catch(e){}
  return {threadId, messageId, simulated:false};
}

/* ---- reply detection ---- */
async function checkReplies(opts={}){
  const silent=opts.silent;
  if(!googleReady()){if(!silent)toast('Connetti Google per controllare le risposte','warn');return 0}
  if(state.config.testMode){if(!silent)toast('Disattiva la modalità test per leggere le risposte reali','warn');return 0}
  const active=state.contacts.filter(c=>c.threadId && !String(c.threadId).startsWith('sim_') && !c.haRisposto && (c.step||0)>0);
  if(!active.length){if(!silent)toast('Nessun thread attivo da controllare','warn');return 0}
  let found=0;
  for(const c of active){
    try{
      // format=minimal: ogni messaggio riporta labelIds. Un messaggio nostro ha 'SENT'.
      // Qualsiasi messaggio del thread SENZA 'SENT' (e non bozza) = risposta del destinatario.
      const th=await gfetch('https://gmail.googleapis.com/gmail/v1/users/me/threads/'+c.threadId+'?format=minimal');
      const msgs=th.messages||[];
      const replied=msgs.some(m=>{const l=m.labelIds||[];return !l.includes('SENT') && !l.includes('DRAFT');});
      if(replied){c.haRisposto=true;found++;}
    }catch(e){console.warn('thread check',c.azienda,e.message)}
  }
  if(found){persist();render();}
  if(!silent) toast(found?`${found} nuove risposte rilevate — follow-up fermati`:'Nessuna nuova risposta','ok');
  else if(found) toast(`${found} nuove risposte rilevate`,'ok');
  return found;
}
let _replyTimer=null;
function startReplyPoll(){
  if(_replyTimer)clearInterval(_replyTimer);
  _replyTimer=setInterval(()=>{ if(googleReady() && !state.config.testMode) checkReplies({silent:true}); }, 180000); // ogni 3 min
}
function stopReplyPoll(){if(_replyTimer){clearInterval(_replyTimer);_replyTimer=null;}}

const SHEET_COLS=['id','azienda','sede','email','ruolo','settore','descrizione','sito_web','tipo_asset','oggetto','corpo','stato','step','data_ultimo_invio','anchor_date','ha_risposto','thread_id','message_id'];
function colLetter(n){return String.fromCharCode(64+n)} // 16 -> 'P'
const LASTCOL=colLetter(SHEET_COLS.length);
let _autoSyncTimer=null;

async function sheetTab(id){
  if(state.config.sheetTab) return state.config.sheetTab;
  try{
    const meta=await gfetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}?fields=sheets.properties.title`);
    const t=(meta.sheets&&meta.sheets[0]&&meta.sheets[0].properties.title)||'Contatti';
    state.config.sheetTab=t;persist();return t;
  }catch(e){return 'Contatti'}
}
async function ensureSheet(){
  if(!googleReady()) throw new Error('Google non connesso');
  if(state.config.sheetId) return state.config.sheetId;
  const r=await gfetch('https://sheets.googleapis.com/v4/spreadsheets',{method:'POST',body:JSON.stringify({
    properties:{title:'FlowLine Outbound — contatti & stato'},
    sheets:[{properties:{title:'Contatti'}}]
  })});
  state.config.sheetId=r.spreadsheetId;state.config.sheetTab='Contatti';persist();renderConn();
  await gfetch(`https://sheets.googleapis.com/v4/spreadsheets/${r.spreadsheetId}/values/Contatti!A1?valueInputOption=RAW`,{method:'PUT',body:JSON.stringify({values:[SHEET_COLS]})});
  return r.spreadsheetId;
}
function contactToRow(c){
  const st=statusOf(c).label;
  const d0=getDraft(c,0);
  return [c.id,c.azienda,c.sede,c.email,c.ruolo,c.settore,
    c.descrizione||'', c.sitoWeb||'', c.tipoAsset,
    c.oggettoBase||d0.oggetto||'', c.corpoBase||'',
    st,String(c.step||0),c.dataUltimoInvio||'',c.anchorDate||'',c.haRisposto?'sì':'no',c.threadId||'',c.messageId||''];
}

// LEGGE i nuovi lead dal foglio e li importa (Sheet -> app)
async function pullFromSheet(opts={}){
  const silent=opts.silent;
  if(!googleReady()){if(!silent)toast('Connetti Google per sincronizzare','warn');return 0}
  if(!state.config.sheetId){if(!silent)toast('Nessun foglio collegato. Premi "Sheet" una volta per crearlo.','warn');return 0}
  let rows;
  try{
    const tab=await sheetTab(state.config.sheetId);
    const r=await gfetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.config.sheetId}/values/${encodeURIComponent(tab)}!A1:Z10000`);
    rows=r.values||[];
  }catch(e){if(!silent)toast('Lettura foglio fallita: '+e.message,'err');return 0}
  if(rows.length<2) return 0;
  const map=guessMap(rows[0]);
  if(map.email==null){if(!silent)toast('Nel foglio non trovo una colonna email','warn');return 0}
  const byEmail=new Map(state.contacts.map(c=>[(c.email||'').toLowerCase(),c]));
  let added=0, updated=0;
  for(let i=1;i<rows.length;i++){
    const row=rows[i];const g=f=>map[f]!=null?String(row[map[f]]??'').trim():'';
    const email=g('email');
    if(!email||!email.includes('@')) continue;
    const key=email.toLowerCase();
    const existing=byEmail.get(key);
    if(existing){
      // aggiorna i campi di ricerca dal foglio (senza toccare lo stato)
      let ch=false;
      const desc=g('descrizione'), web=g('sitoWeb');
      if(desc && desc!==existing.descrizione){existing.descrizione=desc;ch=true;}
      if(web && web!==existing.sitoWeb){existing.sitoWeb=web;ch=true;}
      // riempi i campi vuoti se il foglio ne ha
      ['azienda','sede','ruolo','settore','tipoAsset'].forEach(f=>{const v=g(f);if(v&&!existing[f]){existing[f]=v;ch=true;}});
      if(ch)updated++;
      continue;
    }
    byEmail.set(key,true);
    const c=mkContact({
      azienda:g('azienda'),sede:g('sede'),email,ruolo:g('ruolo'),settore:g('settore'),
      descrizione:g('descrizione'),sitoWeb:g('sitoWeb'),
      tipoAsset:g('tipoAsset'),oggettoBase:g('oggetto'),corpoBase:g('corpo'),
      disiscrizione:g('disiscrizione')||state.templates.disiscrizione,
    });
    state.contacts.push(c);byEmail.set(key,c);
    added++;
  }
  if(added||updated){persist();render()}
  if(!silent) toast(added||updated?`${added} nuovi · ${updated} aggiornati dal foglio`:'Foglio già allineato','ok');
  else if(added||updated) toast(`${added} nuovi · ${updated} aggiornati`,'ok');
  return added;
}

// SCRIVE lo stato di tutti i contatti sul foglio (app -> Sheet)
async function pushToSheet(){
  const id=await ensureSheet();
  const tab=await sheetTab(id);
  // ripulisce le righe dati per evitare residui, poi riscrive tutto
  await gfetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(tab)}!A2:Z10000:clear`,{method:'POST',body:'{}'});
  const values=[SHEET_COLS,...state.contacts.map(contactToRow)];
  await gfetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(tab)}!A1:${LASTCOL}${values.length}?valueInputOption=RAW`,{method:'PUT',body:JSON.stringify({values})});
}

// Sincronizzazione completa: prima importa i nuovi lead, poi riallinea lo stato
async function syncToSheet(opts={}){
  if(!googleReady()){if(!opts.silent)toast('Connetti Google per sincronizzare','warn');return}
  try{
    await pullFromSheet({silent:true});
    await pushToSheet();
    if(!opts.silent)toast('Sincronizzato con il Google Sheet','ok');
  }catch(e){if(!opts.silent)toast('Sync fallita: '+e.message,'err')}
}

function contactFromRow(r){
  const c=mkContact({email:r.email||''});
  c.id=r.id||c.id;
  c.azienda=r.azienda||''; c.sede=r.sede||''; c.ruolo=r.ruolo||''; c.settore=r.settore||'';
  c.descrizione=r.descrizione||''; c.sitoWeb=r.sito_web||''; c.tipoAsset=r.tipo_asset||'';
  c.oggettoBase=r.oggetto||''; c.corpoBase=r.corpo||'';
  c.scheduledDate=r.scheduled_date||null; c.step=r.step||0;
  c.anchorDate=r.anchor_date||null; c.dataUltimoInvio=r.data_ultimo_invio||null;
  c.haRisposto=!!r.ha_risposto; c.threadId=r.thread_id||null; c.messageId=r.message_id||null;
  const d=r.data||{};
  c.drafts=d.drafts||{}; c.history=d.history||[];
  c.disiscrizione=d.disiscrizione||state.templates.disiscrizione; c.fermato=!!d.fermato; c.n=d.n||'';
  return c;
}
// mappa contatto app -> RIGA (colonne Supabase)
function contactToSupaRow(c){
  const nn=v=>(v===''||v===undefined)?null:v; // vuoti -> null (date/testo)
  return {
    id:c.id, email:c.email||null, azienda:nn(c.azienda), sede:nn(c.sede), ruolo:nn(c.ruolo), settore:nn(c.settore),
    descrizione:nn(c.descrizione), sito_web:nn(c.sitoWeb), tipo_asset:nn(c.tipoAsset),
    oggetto:nn(c.oggettoBase), corpo:nn(c.corpoBase),
    scheduled_date:nn(c.scheduledDate), step:c.step||0, stato:statusOf(c).label,
    anchor_date:nn(c.anchorDate), data_ultimo_invio:nn(c.dataUltimoInvio),
    ha_risposto:!!c.haRisposto, thread_id:nn(c.threadId), message_id:nn(c.messageId),
    data:{drafts:c.drafts||{}, history:c.history||[], disiscrizione:c.disiscrizione, fermato:!!c.fermato, n:c.n||''},
    updated_at:new Date().toISOString()
  };
}
async function supaLoad(){
  if(!supa)return;
  try{
    const {data,error}=await supa.from('contacts').select('*').order('updated_at',{ascending:true});
    if(error)throw error;
    if(data && data.length){
      _suppressPush=true;
      // il DATABASE è la verità: sostituisco lo stato locale
      state.contacts=data.map(contactFromRow);
      // ripulisco le lapidi ormai confermate (la riga non c'è più sul DB)
      const live=new Set(state.contacts.map(c=>c.id));
      [..._deleted].forEach(id=>{if(!live.has(id))forgetDeleted(id)});
      // inizializzo lo snapshot: così non rispingo dati appena letti
      _lastPushed=new Map();
      state.contacts.forEach(c=>{const row=contactToSupaRow(c);_lastPushed.set(c.id,JSON.stringify({...row,updated_at:0}));});
      save(LS.contacts,state.contacts);
      _suppressPush=false;
      renderConn();render();
      toast(state.contacts.length+' contatti dal database','ok');
    } else if(state.contacts.length){
      await pushAllToSupabase();
      renderConn();
      toast('Database inizializzato con i contatti locali','ok');
    } else {
      renderConn();
    }
  }catch(e){toast('Supabase load: '+e.message,'err')}
}
function supaSubscribe(){
  if(!supa)return;
  if(_supaChan){supa.removeChannel(_supaChan);_supaChan=null;}
  _supaChan=supa.channel('contacts-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'contacts'},payload=>{
      if(payload.eventType==='DELETE'){
        const id=payload.old&&payload.old.id;
        if(id){state.contacts=state.contacts.filter(c=>c.id!==id);_lastPushed.delete(id);save(LS.contacts,state.contacts);softRender();}
        return;
      }
      const row=payload.new; if(!row||!row.id)return;
      if(_deleted.has(row.id)) return;            // l'abbiamo eliminato noi: non farlo tornare
      const inc=contactFromRow(row); const cur=state.contacts.find(c=>c.id===inc.id);
      if(cur && JSON.stringify(cur)===JSON.stringify(inc)) return; // stesso dato nostro, ignora
      _suppressPush=true;
      if(cur)Object.assign(cur,inc); else state.contacts.push(inc);
      // allineo lo snapshot al dato appena arrivato: evita un push inutile
      _lastPushed.set(inc.id,JSON.stringify({...contactToSupaRow(inc),updated_at:0}));
      save(LS.contacts,state.contacts);
      _suppressPush=false;
      softRender();
    })
    .subscribe();
}

function schedulePush(){
  if(!supaReady()||_suppressPush)return;
  if(_pushTimer)clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>pushAllToSupabase(),700);
}
// snapshot dell'ultimo stato scritto sul DB: serve a spingere SOLO ciò che è cambiato
let _lastPushed=new Map();
// "lapidi": id eliminati da noi. Impediscono che un upsert li resusciti.
let _deleted=new Set(load('flo_deleted',[]));
function rememberDeleted(id){_deleted.add(id);save('flo_deleted',[..._deleted]);}
function forgetDeleted(id){_deleted.delete(id);save('flo_deleted',[..._deleted]);}

function setSyncState(s,msg){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  if(!dot||!txt)return;
  if(s==='saving'){dot.className='dot warn';txt.textContent='Salvataggio…';}
  else if(s==='err'){dot.className='dot';txt.style.color='var(--late)';txt.textContent=msg||'Errore sync';}
  else{dot.className='dot on';txt.style.color='';txt.textContent='Database online';}
}

async function pushAllToSupabase(){
  if(!supaReady()||_suppressPush)return;
  // spingi SOLO i contatti nuovi o modificati (mai tutti: eviterebbe di riscrivere righe altrui)
  const changed=[];
  for(const c of state.contacts){
    if(_deleted.has(c.id)) continue;            // mai reinserire ciò che abbiamo eliminato
    const row=contactToSupaRow(c);
    const sig=JSON.stringify({...row,updated_at:0}); // ignora il timestamp nel confronto
    if(_lastPushed.get(c.id)!==sig){ changed.push({row,sig,id:c.id}); }
  }
  if(!changed.length)return;
  setSyncState('saving');
  try{
    const {error}=await supa.from('contacts').upsert(changed.map(x=>x.row),{onConflict:'id'});
    if(error)throw error;
    changed.forEach(x=>_lastPushed.set(x.id,x.sig));
    setSyncState('ok');
  }catch(e){
    setSyncState('err','Sync fallita');
    toast('Salvataggio su Supabase fallito: '+e.message,'err');
    console.warn('supabase push',e);
  }
}
// elimina davvero: attende la conferma del DB, altrimenti ripristina il contatto
async function supaDelete(id){
  if(!supaReady())return {ok:true,local:true};
  setSyncState('saving');
  try{
    const {error}=await supa.from('contacts').delete().eq('id',id);
    if(error)throw error;
    _lastPushed.delete(id);
    rememberDeleted(id);
    setSyncState('ok');
    return {ok:true};
  }catch(e){
    setSyncState('err','Eliminazione fallita');
    return {ok:false,err:e.message};
  }
}

/* migrazione una-tantum dal vecchio Google Sheet -> Supabase */
async function migrateFromSheet(){
  const url=(document.getElementById('mig-sheet')?.value||'').trim();
  if(!url){toast('Incolla il link (o ID) del vecchio Google Sheet','warn');return}
  if(!googleReady()){toast('Connetti prima Google (serve per leggere il foglio)','warn');connectGoogle();return}
  if(!supaReady()){ if(!confirm('Supabase non risulta connesso: i contatti verrebbero importati solo in locale. Continuare comunque?'))return; }
  const btn=document.getElementById('mig-btn');const old=btn?btn.innerHTML:'';
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Migro…';}
  const prevId=state.config.sheetId, prevTab=state.config.sheetTab;
  try{
    const m=url.match(/\/d\/([a-zA-Z0-9-_]+)/); const id=m?m[1]:url;
    state.config.sheetId=id; state.config.sheetTab='';
    const before=state.contacts.length;
    await pullFromSheet({});                 // legge il foglio, importa i nuovi + aggiorna esistenti, persiste
    const imported=state.contacts.length-before;
    if(supaReady()) await pushAllToSupabase(); // spinge subito tutto su Supabase
    toast(`Migrazione completata: ${imported} nuovi contatti su Supabase`,'ok');
  }catch(e){toast('Migrazione fallita: '+e.message,'err');}
  finally{
    // non lascio il foglio collegato: Supabase resta l'unica sorgente
    state.config.sheetId=prevId||''; state.config.sheetTab=prevTab||''; persist();
    if(btn){btn.disabled=false;btn.innerHTML=old;}
    render();
  }
}

   ======================================================= */
async function generateEmail(c, step){
  const key=state.config.anthropicKey;
  if(!key) throw new Error('Manca la chiave API Anthropic (Impostazioni)');
  const cad=state.cadence[step];
  const prevSent=c.history.filter(h=>h.step<step).map(h=>`[${state.cadence[h.step]?.nome}] Oggetto: ${h.oggetto}\n${h.corpo}`).join('\n\n---\n\n');
  const sys=(state.templates.promptSistema||PROMPT_SISTEMA_DEFAULT)
    .replace(/{azienda}/g, state.templates.azienda||'')
    .replace(/{mittente}/g, state.templates.mittente||'')
    .replace(/{tono}/g, state.templates.tono||'')
    .replace(/{regole_oggetto}/g, state.templates.regoleOggetto||'')
    .replace(/{regole_corpo}/g, state.templates.regoleCorpo||'');
  const ctx=`Destinatario:
- Azienda: ${c.azienda||'n/d'}
- Sede: ${c.sede||'n/d'}
- Ruolo/Contatto: ${c.ruolo||'n/d'}
- Settore: ${c.settore||'n/d'}
- Sito web: ${c.sitoWeb||'n/d'}
- Tipo asset/offerta: ${c.tipoAsset||'automazione dei processi (preventivi, ordini, listini)'}
${c.descrizione?`
DESCRIZIONE AZIENDA (informazione reale e verificata su cui basare la personalizzazione — usala per un aggancio concreto e specifico, senza copiarla parola per parola):
${c.descrizione}`:''}

Step da scrivere: "${cad.nome}".
Angolo/obiettivo di questo step: ${cad.angolo}
${step===0&&c.corpoBase?`\nBozza esistente da migliorare/riadattare (mantieni il senso, rendila naturale):\nOggetto: ${c.oggettoBase}\n${c.corpoBase}`:''}
${prevSent?`\nEmail già inviate in questo thread (NON ripeterti, costruisci sopra):\n${prevSent}`:''}`;
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:900,system:sys,messages:[{role:'user',content:ctx}]})
  });
  if(!r.ok){const t=await r.text();throw new Error('Anthropic '+r.status+': '+t.slice(0,200))}
  const data=await r.json();
  const u=data.usage||{};
  const inT=(u.input_tokens||0)+(u.cache_read_input_tokens||0)+(u.cache_creation_input_tokens||0);
  const outT=u.output_tokens||0;
  recordUsage(inT,outT);
  const callCost=costEUR({input:inT,output:outT});
  let txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  txt=txt.replace(/```json|```/g,'').trim();
  const m=txt.match(/\{[\s\S]*\}/); if(m)txt=m[0];
  const obj=JSON.parse(txt);
  return {oggetto:obj.oggetto||'', corpo:obj.corpo||'', cost:callCost};
}

/* get or build the draft for a contact's current step */
function getDraft(c, step){
  if(c.drafts && c.drafts[step]) return c.drafts[step];
  // default seed
  if(step===0 && c.oggettoBase){ return {oggetto:c.oggettoBase, corpo:c.corpoBase, seeded:true}; }
  // follow-ups: subject = same as email1 (stesso thread) ; body from template angle placeholder
  const subj = c.history[0]?.oggetto || c.oggettoBase || 'Seguito';
  return {oggetto:subj, corpo:'(Genera con AI o scrivi il testo del follow-up)', seeded:true};
}
function setDraft(c,step,d){c.drafts=c.drafts||{};c.drafts[step]={...d,seeded:false};persist()}

const HEADER_MAP={
  email:['email','e-mail','mail','indirizzo email','posta'],
  azienda:['azienda','company','ragione sociale','nome azienda','ditta','cliente'],
  sede:['sede','città','city','luogo','indirizzo','provincia','località'],
  nome:['nome','contatto','referente','name','persona'],
  ruolo:['ruolo','role','posizione','carica','title','qualifica'],
  settore:['settore','industry','categoria','comparto','ambito'],
  descrizione:['descrizione azienda','descrizione','description','note azienda','info azienda','profilo','about','bio'],
  sitoWeb:['sito web','sito internet','sito','website','web','url','homepage','pagina web'],
  tipoAsset:['tipo asset','asset','offerta','offer','prodotto','servizio','proposta'],
  oggetto:['oggetto','subject','titolo'],
  corpo:['corpo email 1','corpo','body','testo','email 1','messaggio','corpo email'],
  disiscrizione:['disiscrizione','unsubscribe','opt-out','disisc'],
  n:['n','#','num','numero','id'],
};
function guessMap(headers){
  const map={};
  const norm=h=>String(h||'').toLowerCase().trim();
  for(const field in HEADER_MAP){
    for(let i=0;i<headers.length;i++){
      const h=norm(headers[i]);
      if(HEADER_MAP[field].some(k=>h===k||h.includes(k))){map[field]=i;break;}
    }
  }
  return map;
}
function handleFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      // pick the sheet with most rows that has an email-like column
      let best=null,bestRows=null;
      for(const name of wb.SheetNames){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,blankrows:false});
        if(rows.length<2)continue;
        const hdr=rows[0].map(x=>String(x||'').toLowerCase());
        const score=rows.length + (hdr.some(h=>h.includes('email')||h.includes('mail'))?1000:0);
        if(!best||score>best.score){best={name,score};bestRows=rows;}
      }
      if(!bestRows){toast('Nessun foglio valido trovato','err');return}
      openImportModal(bestRows[0], bestRows.slice(1), best.name, wb.SheetNames);
    }catch(err){toast('Errore lettura file: '+err.message,'err')}
  };
  reader.readAsArrayBuffer(file);
}

const SHIFT_COLORS=['#4f46e5','#0d9488','#d97706','#dc2626','#7c3aed','#2563eb','#db2777','#65a30d'];
const WD_NAMES=['','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
let _shiftChan=null, _shiftLoadT=null;
function m2t(m){if(m==null)return'';const h=Math.floor(m/60),mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}
function t2m(t){const p=String(t).split(':');return (+p[0]||0)*60+(+p[1]||0)}
function isoWd(d){return ((d.getDay()+6)%7)+1} // Lun=1..Dom=7
function me(){return state.shifts.members.find(m=>m.id===state.shifts.meId)||null}
function siItem(kind,extra){return {id:'si'+Math.random().toString(36).slice(2,11),member_id:state.shifts.meId,kind,weekday:null,date:null,start_min:null,end_min:null,title:null,...extra,updated_at:new Date().toISOString()}}

function subtractRange(blocks,off){
  const res=[];
  blocks.forEach(b=>{
    if(off.start<=b.start&&off.end>=b.end)return;
    if(off.end<=b.start||off.start>=b.end){res.push(b);return;}
    if(off.start>b.start)res.push({start:b.start,end:off.start});
    if(off.end<b.end)res.push({start:off.end,end:b.end});
  });
  return res.filter(b=>b.end>b.start);
}
function mergeBlocks(bl){const b=bl.slice().sort((a,c)=>a.start-c.start);const m=[];b.forEach(x=>{const l=m[m.length-1];if(l&&x.start<=l.end)l.end=Math.max(l.end,x.end);else m.push({...x})});return m}
function subtractAll(blocks,offs){let r=blocks;offs.forEach(o=>{r=subtractRange(r,o)});return r}
function intersectRanges(a,b){const res=[];a.forEach(x=>b.forEach(y=>{const s=Math.max(x.start,y.start),e=Math.min(x.end,y.end);if(e>s)res.push({start:s,end:e})}));return mergeBlocks(res)}
// scompone la giornata di una persona in fasce LIBERE e fasce OCCUPATE (impegni calendario)
function daySplit(memberId,iso){
  const avail=effectiveBlocks(memberId,iso);
  const busy=mergeBlocks(state.shifts.gcal.filter(g=>g.member_id===memberId&&g.date===iso).map(g=>({start:g.start_min,end:g.end_min})));
  return {avail, free:subtractAll(avail,busy), occupied:intersectRanges(avail,busy)};
}
function effectiveBlocks(memberId,iso){
  const wd=isoWd(parseD(iso));
  let blocks=state.shifts.rules.filter(r=>r.member_id===memberId&&r.weekday===wd).map(r=>({start:r.start_min,end:r.end_min}));
  state.shifts.exceptions.filter(e=>e.member_id===memberId&&e.date===iso&&e.kind==='extra').forEach(e=>blocks.push({start:e.start_min,end:e.end_min}));
  state.shifts.exceptions.filter(e=>e.member_id===memberId&&e.date===iso&&e.kind==='off').forEach(e=>{
    if(e.start_min==null)blocks=[];else blocks=subtractRange(blocks,{start:e.start_min,end:e.end_min});
  });
  blocks.sort((a,b)=>a.start-b.start);
  const merged=[];blocks.forEach(b=>{const last=merged[merged.length-1];if(last&&b.start<=last.end)last.end=Math.max(last.end,b.end);else merged.push({...b})});
  return merged;
}

async function shiftsLoad(){
  if(!supaReady())return;
  try{
    const [m,i]=await Promise.all([supa.from('shift_members').select('*'),supa.from('shift_items').select('*')]);
    if(m.error||i.error)throw(m.error||i.error);
    state.shifts.needsSetup=false;
    state.shifts.members=m.data||[];
    const items=i.data||[];
    state.shifts.rules=items.filter(x=>x.kind==='rule');
    state.shifts.exceptions=items.filter(x=>x.kind==='off'||x.kind==='extra');
    state.shifts.gcal=items.filter(x=>x.kind==='gcal');
    // riaggancio il profilo all'account Google connesso
    const em=(state.google.email||'').toLowerCase();
    if(em){const f=state.shifts.members.find(m=>(m.email||'').toLowerCase()===em);state.shifts.meId=f?f.id:null;}
    if(state.module==='shifts')render();
  }catch(e){
    if(/relation|does not exist|Could not find|schema cache/i.test(e.message||'')){state.shifts.needsSetup=true;if(state.module==='shifts')render();}
    else console.warn('shifts load',e.message);
  }
}
function shiftsLoadDebounced(){clearTimeout(_shiftLoadT);_shiftLoadT=setTimeout(shiftsLoad,300);}
function shiftsSubscribe(){
  if(!supa)return;
  if(_shiftChan){supa.removeChannel(_shiftChan);_shiftChan=null;}
  _shiftChan=supa.channel('shifts-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'shift_members'},shiftsLoadDebounced)
    .on('postgres_changes',{event:'*',schema:'public',table:'shift_items'},shiftsLoadDebounced)
    .subscribe();
}

async function saveMe(){
  if(!supaReady()){toast('Database non collegato','warn');return false}
  if(!googleReady()){toast('Accedi con Google per creare il profilo','warn');connectGoogle();return false}
  const name=(document.getElementById('me-name')?.value||'').trim();
  if(!name){toast('Inserisci il tuo nome','warn');return false}
  const color=document.getElementById('me-color')?.value||SHIFT_COLORS[0];
  const gcalOn=document.getElementById('me-gcal')?.classList.contains('on');
  const em=(state.google.email||'').toLowerCase();
  // niente doppioni: se esiste già un profilo con questa email, aggiorno quello
  const existing=state.shifts.members.find(x=>(x.email||'').toLowerCase()===em);
  const id=state.shifts.meId||existing?.id||('m'+Math.random().toString(36).slice(2,9));
  const row={id,name,color,email:em,gcal:!!gcalOn,updated_at:new Date().toISOString()};
  const {error}=await supa.from('shift_members').upsert(row,{onConflict:'id'});
  if(error){toast('Errore profilo: '+error.message,'err');return false}
  state.shifts.meId=id;
  await shiftsLoad();
  toast('Profilo salvato','ok');
  if(gcalOn) syncGcal();
  return true;
}

async function deleteProfile(id){
  const m=state.shifts.members.find(x=>x.id===id);if(!m)return;
  const mine=id===state.shifts.meId;
  if(!confirm(`Eliminare il profilo "${m.name}"${m.email?' ('+m.email+')':''}?\n\nVerranno rimosse anche tutte le sue disponibilità.${mine?'\n\nÈ il TUO profilo: dovrai ricrearlo.':''}`))return;
  try{
    const r1=await supa.from('shift_items').delete().eq('member_id',id);
    if(r1.error)throw r1.error;
    const r2=await supa.from('shift_members').delete().eq('id',id);
    if(r2.error)throw r2.error;
    if(mine)state.shifts.meId=null;
    await shiftsLoad();
    toast('Profilo eliminato','ok');
  }catch(e){toast('Eliminazione fallita: '+e.message,'err')}
}

// elenco di TUTTI i calendari collegati all'account
async function listCalendars(){
  const r=await gfetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=freeBusyReader&maxResults=250');
  return (r.items||[]).filter(c=>!c.deleted);

function chosenCals(){return load('flo_cals',null)}   // null = tutti quelli attivi su Google
// spezza un impegno in segmenti giornalieri (gestisce eventi oltre la mezzanotte)
function busyToSegments(startISO,endISO){
  const s=new Date(startISO), e=new Date(endISO);
  const segs=[];
  let cur=new Date(s.getFullYear(),s.getMonth(),s.getDate());
  let guard=0;
  while(cur<=e && guard++<40){
    const dayStart=new Date(cur), dayEnd=new Date(cur); dayEnd.setDate(dayEnd.getDate()+1);
    const a=Math.max(s.getTime(),dayStart.getTime()), b=Math.min(e.getTime(),dayEnd.getTime());
    if(b>a){
      const sm=Math.round((a-dayStart.getTime())/60000);
      const em=Math.round((b-dayStart.getTime())/60000);
      if(em>sm) segs.push({date:isoD(dayStart),start_min:sm,end_min:Math.min(em,24*60)});
    }
    cur.setDate(cur.getDate()+1);
  }
  return segs;
}
async function syncGcal(opts={}){
  if(!state.shifts.meId){if(!opts.repair)toast('Crea prima il profilo','warn');return}
  if(!googleReady()){if(!opts.repair){toast('Connetti Google per il calendario','warn');connectGoogle();}return}
  try{
    // 1) quali calendari leggere
    const all=await listCalendars();
    const sel=chosenCals();
    const use=all.filter(c=> sel? sel.includes(c.id) : c.selected!==false);
    if(!use.length){toast('Nessun calendario selezionato','warn');return}
    // 2) FreeBusy: legge TUTTI i calendari scelti e torna solo le fasce occupate (nessun dettaglio)
    const tMin=startOfWeek(addDays(today(),-7)), tMax=addDays(startOfWeek(today()),42);
    const busyAll=[];
    for(let i=0;i<use.length;i+=45){                       // il limite è 50 calendari per richiesta
      const chunk=use.slice(i,i+45);
      const r=await gfetch('https://www.googleapis.com/calendar/v3/freeBusy',{method:'POST',body:JSON.stringify({
        timeMin:tMin.toISOString(), timeMax:tMax.toISOString(),
        items:chunk.map(c=>({id:c.id}))
      })});
      Object.values(r.calendars||{}).forEach(c=>(c.busy||[]).forEach(b=>busyAll.push(b)));
    }
    // 3) in segmenti giornalieri, poi fondo le sovrapposizioni tra calendari diversi
    const byDay={};
    busyAll.forEach(b=>busyToSegments(b.start,b.end).forEach(sg=>{(byDay[sg.date]=byDay[sg.date]||[]).push({start:sg.start_min,end:sg.end_min})}));
    const rows=[];
    Object.keys(byDay).forEach(dt=>mergeBlocks(byDay[dt]).forEach(b=>rows.push(siItem('gcal',{date:dt,start_min:b.start,end_min:b.end,title:null}))));
    // 4) riscrivo
    await supa.from('shift_items').delete().eq('member_id',state.shifts.meId).eq('kind','gcal');
    if(rows.length){const {error}=await supa.from('shift_items').insert(rows);if(error)throw error;}
    await shiftsLoad();
    toast(`${rows.length} impegni da ${use.length} calendar${use.length>1?'i':'io'}`,'ok');
  }catch(e){
    if(/insufficient authentication scopes|403|Insufficient Permission/i.test(e.message||'')){
      toast('Permesso calendario mancante: riautorizza Google','err');
      if(confirm('Il permesso per il Google Calendar non è ancora stato concesso.\n\n1) Su Google Cloud aggiungi lo scope calendar.readonly (Auth Platform → Accesso ai dati)\n2) Riautorizza qui concedendo TUTTI i permessi\n\nRiautorizzare ora?')) reauthGoogle();
    } else toast('Sync calendario: '+e.message,'err');
  }
}

const SHIFTS_SQL=`-- Tabelle del modulo Turni (esegui una volta)
create table if not exists shift_members (
  id text primary key,
  name text,
  color text,
  email text,
  gcal boolean default false,
  updated_at timestamptz default now()
);
create table if not exists shift_items (
  id text primary key,
  member_id text,
  kind text,           -- 'rule' | 'off' | 'extra' | 'gcal'
  weekday int,         -- 1=Lun .. 7=Dom (regole ricorrenti)
  date date,           -- eccezioni ed eventi calendario
  start_min int,
  end_min int,
  title text,
  updated_at timestamptz default now()
);
alter table shift_members enable row level security;
alter table shift_items enable row level security;
create policy "sm all" on shift_members for all using (true) with check (true);
create policy "si all" on shift_items for all using (true) with check (true);
alter publication supabase_realtime add table shift_members;
alter publication supabase_realtime add table shift_items;`;
